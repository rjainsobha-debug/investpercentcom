<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Tax Calculator</h2>

<input id="income">
<button onclick="calc()">Calculate</button>
<div id="result"></div>

<script>
function calc(){
let i=+income.value;
let tax=i<300000?0:i<700000?(i-300000)*0.05:i<1000000?20000+(i-700000)*0.1:50000+(i-1000000)*0.2;
result.innerHTML="₹ "+Math.round(tax);
}
</script>

</body></html>
