<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tax</title>

<style>
body{background:#041424;color:#fff;font-family:Inter}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#0b2d4d;padding:20px;border-radius:20px}
input{width:100%;padding:10px;margin-top:10px}
button{margin-top:10px;padding:10px;width:100%;background:#32c7ff}
</style>
</head>

<body>

<div class="container">
<h1>Tax Calculator</h1>

<div class="card">
<input id="income" placeholder="Annual Income">

<button onclick="calc()">Calculate</button>

<div id="result"></div>
</div>
</div>

<script>
function calc(){
let inc=+income.value;

let newTax = inc<=300000?0:
inc<=700000?(inc-300000)*0.05:
inc<=1000000?20000+(inc-700000)*0.1:
inc<=1200000?50000+(inc-1000000)*0.15:
inc<=1500000?80000+(inc-1200000)*0.2:
140000+(inc-1500000)*0.3;

let oldTax = inc<=250000?0:
inc<=500000?(inc-250000)*0.05:
inc<=1000000?12500+(inc-500000)*0.2:
112500+(inc-1000000)*0.3;

result.innerHTML=
"New: ₹"+Math.round(newTax*1.04)+"<br>"+
"Old: ₹"+Math.round(oldTax*1.04);
}
</script>

</body>
</html>
