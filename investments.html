<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Investments</title>

<style>
body{background:#041424;color:#fff;font-family:Inter}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#0b2d4d;padding:20px;border-radius:20px;margin-top:20px}
input{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none}
button{margin-top:10px;padding:10px;width:100%;background:#32c7ff;border:none}
</style>
</head>

<body>

<div class="container">
<h1>SIP Calculator</h1>

<div class="card">
<input id="amount" placeholder="Monthly Investment">
<input id="rate" placeholder="Return %">
<input id="years" placeholder="Years">

<button onclick="calc()">Calculate</button>

<canvas id="chart"></canvas>
<div id="result"></div>
</div>

</div>

<script>
function calc(){
let P = +amount.value;
let r = +rate.value/100/12;
let n = +years.value*12;

let M = P*((Math.pow(1+r,n)-1)/r)*(1+r);

result.innerHTML="Future Value: ₹"+Math.round(M);

let data=[];
let labels=[];

for(let i=1;i<=n;i++){
let val=P*((Math.pow(1+r,i)-1)/r)*(1+r);
data.push(val);
labels.push(i);
}

new Chart(document.getElementById("chart"),{
type:'line',
data:{labels:labels,datasets:[{data:data}]}
});
}
</script>

</body>
</html>
