<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investments - InvestPercent</title>
  <link rel="stylesheet" href="css/style.css">

</head>
<body>
  <div class="market-strip">
    <iframe src="https://ticker.finology.in/" frameborder="0"></iframe>
  </div>

  <div class="navbar">
    <div class="logo">InvestPercent</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="investments.html">Invest</a>
      <a href="property.html">Property</a>
      <a href="tax.html">Tax</a>
      <a href="wealth.html">Wealth</a>
      <a href="forex.html">Forex</a>
    </div>
  </div>


<div class="page-hero">
  <h1>SIP Calculator</h1>
  <p>Project your mutual fund SIP growth in seconds.</p>
</div>

<div class="calc-wrap">
  <div class="calc-card">
    <div class="form-grid">
      <div>
        <label for="sipAmount">Monthly Investment</label>
        <input id="sipAmount" type="number" placeholder="10000">
      </div>
      <div>
        <label for="sipRate">Expected Return (%)</label>
        <input id="sipRate" type="number" placeholder="12">
      </div>
      <div class="full">
        <label for="sipYears">Time Period (Years)</label>
        <input id="sipYears" type="number" placeholder="15">
      </div>
    </div>

    <div class="actions">
      <button class="btn" onclick="calculateSIP()">Calculate SIP</button>
      <button class="btn btn-secondary" onclick="openPopup('investment')">Get Free Plan</button>
    </div>

    <div id="sipResult" class="result" style="display:none;">
      <h3>Estimated Future Value</h3>
      <div id="sipValue" class="value">₹ 0</div>
      <div class="note">Total invested: <span id="sipInvested">₹ 0</span></div>
    </div>
  </div>
</div>


  <div id="popup" class="popup">
    <div class="popup-box">
      <h3>Get Free Financial Plan</h3>
      <p>Fill your details and continue to WhatsApp.</p>
      <input id="leadName" placeholder="Your Name">
      <input id="leadMobile" placeholder="Mobile Number">
      <input type="hidden" id="leadCategory" value="investment">
      <div class="popup-actions">
        <button class="btn" onclick="goToWhatsApp()">Continue</button>
        <button class="btn btn-secondary" onclick="closePopup()">Cancel</button>
      </div>
    </div>
  </div>

  <a href="https://wa.me/918882332050" class="whatsapp" aria-label="WhatsApp">💬</a>

  <script src="js/app.js"></script>
</body>
</html>
