<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>investpercent.com — Financial Universe</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0a0e1a;
--card:#121a2f;
--accent:#00d4ff;
--text:#ffffff;
--muted:#9aa4c7;
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
}

/* HEADER */
header{
position:sticky;
top:0;
background:#0f1628;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.logo{
font-family:Poppins;
font-size:22px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
-webkit-background-clip:text;
color:transparent;
}

nav a{
color:var(--text);
margin:0 10px;
text-decoration:none;
}

/* HERO */
.hero{
padding:60px 20px;
text-align:center;
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.hero p{
color:var(--muted);
}

/* CARD */
.card{
background:var(--card);
margin:20px;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
background:#1a2545;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
color:white;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:15px;
font-size:18px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
color:var(--muted);
}
</style>
</head>

<body>

<header>
<div class="logo">invest%</div>
<nav>
<a href="#">Home</a>
<a href="#sip">SIP</a>
<a href="#emi">EMI</a>
<a href="#tax">Tax</a>
</nav>
</header>

<section class="hero">
<h1>Your Complete Financial Universe</h1>
<p>Calculate. Compare. Grow.</p>
</section>

<!-- SIP CALCULATOR -->
<div class="card" id="sip">
<h2>SIP Calculator</h2>

<input type="number" id="sipAmount" placeholder="Monthly Investment ₹">
<input type="number" id="sipRate" placeholder="Return %">
<input type="number" id="sipYears" placeholder="Years">

<button onclick="calcSIP()">Calculate</button>

<div class="result" id="sipResult"></div>

<canvas id="sipChart"></canvas>
</div>

<!-- EMI CALCULATOR -->
<div class="card" id="emi">
<h2>Home Loan EMI</h2>

<input type="number" id="loanAmount" placeholder="Loan Amount ₹">
<input type="number" id="loanRate" placeholder="Interest %">
<input type="number" id="loanYears" placeholder="Years">

<button onclick="calcEMI()">Calculate</button>

<div class="result" id="emiResult"></div>
</div>

<!-- TAX CALCULATOR -->
<div class="card" id="tax">
<h2>Income Tax Calculator</h2>

<input type="number" id="salary" placeholder="Annual Salary ₹">

<button onclick="calcTax()">Calculate</button>

<div class="result" id="taxResult"></div>
</div>

<footer>
info@investpercent.com <br>
© 2025 investpercent.com
</footer>

<script>

/* SIP */
let sipChart;

function calcSIP(){
let P = parseFloat(document.getElementById("sipAmount").value);
let r = parseFloat(document.getElementById("sipRate").value)/100/12;
let n = parseFloat(document.getElementById("sipYears").value)*12;

let future = P * (((Math.pow(1+r,n)-1)/r)*(1+r));

document.getElementById("sipResult").innerHTML =
"Future Value: ₹" + Math.round(future).toLocaleString();

if(sipChart) sipChart.destroy();

sipChart = new Chart(document.getElementById("sipChart"),{
type:'bar',
data:{
labels:['Invested','Returns'],
datasets:[{
data:[P*n,future-(P*n)],
backgroundColor:['#00d4ff','#00e676']
}]
}
});
}

/* EMI */
function calcEMI(){
let P = parseFloat(document.getElementById("loanAmount").value);
let r = parseFloat(document.getElementById("loanRate").value)/12/100;
let n = parseFloat(document.getElementById("loanYears").value)*12;

let emi = P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);

document.getElementById("emiResult").innerHTML =
"EMI: ₹" + Math.round(emi).toLocaleString();
}

/* TAX */
function calcTax(){
let income = parseFloat(document.getElementById("salary").value);

let tax = 0;

if(income <= 300000) tax=0;
else if(income <= 700000) tax=(income-300000)*0.05;
else if(income <= 1000000) tax=20000+(income-700000)*0.10;
else tax=50000+(income-1000000)*0.20;

document.getElementById("taxResult").innerHTML =
"Estimated Tax: ₹" + Math.round(tax).toLocaleString();
}

</script>

</body>
</html>
