<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvestPercent — Financial Universe</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Inter;
background:#0a0e1a;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#0f1628;
position:sticky;
top:0;
}

.logo{
font-weight:800;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
padding:10px;
border-radius:10px;
border:none;
background:#141d35;
color:white;
width:100%;
margin-top:10px;
}

button{
padding:10px;
margin-top:10px;
background:#00d4ff;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.container{padding:20px}

.card{
background:#0f1628;
padding:20px;
margin-top:20px;
border-radius:15px;
}

.result{margin-top:10px;color:#00e676}

.favorite{
cursor:pointer;
float:right;
}
</style>

</head>

<body>

<header>
<div class="logo">invest%</div>
<input id="search" placeholder="Search tools...">
</header>

<div class="container" id="app"></div>

<script>

/* ================= ENGINE ================= */

const calculators = [

{
name:"SIP Calculator",
id:"sip",
html:`
<input id="sipAmount" placeholder="Monthly Investment">
<input id="sipRate" placeholder="Return %">
<input id="sipYears" placeholder="Years">
<button onclick="calcSIP()">Calculate</button>
<canvas id="sipChart"></canvas>
<div id="sipResult" class="result"></div>
`
},

{
name:"FD Calculator",
id:"fd",
html:`
<input id="fdAmount" placeholder="Amount">
<input id="fdRate" placeholder="Rate %">
<input id="fdYears" placeholder="Years">
<button onclick="calcFD()">Calculate</button>
<div id="fdResult" class="result"></div>
`
},

{
name:"EMI Calculator",
id:"emi",
html:`
<input id="loanAmount" placeholder="Loan Amount">
<input id="loanRate" placeholder="Rate %">
<input id="loanYears" placeholder="Years">
<button onclick="calcEMI()">Calculate</button>
<div id="emiResult" class="result"></div>
`
},

{
name:"Tax Calculator",
id:"tax",
html:`
<input id="income" placeholder="Annual Income">
<button onclick="calcTax()">Calculate</button>
<div id="taxResult" class="result"></div>
`
},

{
name:"Inflation Calculator",
id:"inflation",
html:`
<input id="infAmount" placeholder="Current Amount">
<input id="infRate" placeholder="Inflation %">
<input id="infYears" placeholder="Years">
<button onclick="calcInflation()">Calculate</button>
<div id="infResult" class="result"></div>
`
},

{
name:"Net Worth Calculator",
id:"networth",
html:`
<input id="assets" placeholder="Total Assets">
<input id="liabilities" placeholder="Total Liabilities">
<button onclick="calcNet()">Calculate</button>
<div id="netResult" class="result"></div>
`
}

];

/* ================= RENDER ================= */

function render(){

let app=document.getElementById("app");
app.innerHTML="";

calculators.forEach(c=>{

let fav = isFav(c.id) ? "⭐" : "☆";

app.innerHTML+=`
<div class="card">
<h3>${c.name} <span class="favorite" onclick="toggleFav('${c.id}')">${fav}</span></h3>
${c.html}
</div>
`;

});

}

render();

/* ================= FAVORITES ================= */

function toggleFav(id){

let favs=JSON.parse(localStorage.getItem("fav")||"[]");

if(favs.includes(id)){
favs=favs.filter(f=>f!=id);
}else{
favs.push(id);
}

localStorage.setItem("fav",JSON.stringify(favs));
render();
}

function isFav(id){
let favs=JSON.parse(localStorage.getItem("fav")||"[]");
return favs.includes(id);
}

/* ================= CALCULATIONS ================= */

function calcSIP(){

let P=+sipAmount.value;
let r=+sipRate.value/100/12;
let n=+sipYears.value*12;

let M=P*((Math.pow(1+r,n)-1)/r)*(1+r);

sipResult.innerHTML="₹ "+Math.round(M);
}

function calcFD(){

let P=+fdAmount.value;
let r=+fdRate.value/100;
let t=+fdYears.value;

let A=P*Math.pow(1+r,t);

fdResult.innerHTML="₹ "+Math.round(A);
}

function calcEMI(){

let P=+loanAmount.value;
let r=+loanRate.value/100/12;
let n=+loanYears.value*12;

let emi=(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);

emiResult.innerHTML="₹ "+Math.round(emi);
}

function calcTax(){

let inc=+income.value;

let tax=inc<=300000?0:
inc<=700000?(inc-300000)*0.05:
inc<=1000000?20000+(inc-700000)*0.1:
inc<=1200000?50000+(inc-1000000)*0.15:
inc<=1500000?80000+(inc-1200000)*0.2:
140000+(inc-1500000)*0.3;

taxResult.innerHTML="₹ "+Math.round(tax);
}

function calcInflation(){

let P=+infAmount.value;
let r=+infRate.value/100;
let t=+infYears.value;

let A=P*Math.pow(1+r,t);

infResult.innerHTML="Future Value: ₹"+Math.round(A);
}

function calcNet(){

let a=+assets.value;
let l=+liabilities.value;

netResult.innerHTML="Net Worth: ₹"+(a-l);
}

/* ================= SEARCH ================= */

document.getElementById("search").addEventListener("keyup",function(){

let val=this.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(val)?"block":"none";
});

});

</script>

</body>
</html>
