<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="css/navbar.css">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retirement Dashboard — investpercent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* IMPORTANT: FULL UI SAME AS INVESTMENT PAGE */
body{font-family:Inter;background:#060915;color:#fff;margin:0}
.page{max-width:1400px;margin:auto;padding:20px}
.hero{padding:30px;background:#0b1224;border-radius:20px}
.tabbar{margin-top:20px}
.tab{padding:10px 14px;margin:5px;border-radius:10px;background:#18284d;color:#9da9c6;cursor:pointer}
.tab.active{background:#00d4ff;color:#000}
.layout{display:grid;grid-template-columns:350px 1fr;gap:20px;margin-top:20px}
.panel{background:#0f1830;padding:20px;border-radius:20px}
.control-group{margin-bottom:15px}
.wealth-number{font-size:40px;font-weight:800}
canvas{height:300px}
</style>
</head>

<body>

<div class="page">
<div id="navbar"></div>

<section class="hero">
<h1>Retirement Planning Dashboard</h1>
<p>Plan your retirement corpus, FIRE goal, and income sustainability.</p>

<div class="tabbar" id="tabs"></div>
</section>

<section class="layout">

<!-- LEFT -->
<div class="panel">
<div id="controls"></div>
</div>

<!-- RIGHT -->
<div class="panel">
<div class="wealth-number" id="result">₹0</div>
<canvas id="chart"></canvas>
</div>

</section>
</div>

<script>

const CALCS = {
corpus:{
label:"Corpus",
controls:[
{id:"expense",label:"Monthly Expense",min:10000,max:200000,value:50000},
{id:"years",label:"Years",min:1,max:40,value:25},
{id:"inflation",label:"Inflation",min:1,max:10,value:6}
]
},
fire:{
label:"FIRE",
controls:[
{id:"expense",label:"Annual Expense",min:100000,max:5000000,value:600000},
{id:"rate",label:"Withdrawal %",min:2,max:6,value:4}
]
}
};

let active="corpus";
let state={};

function init(){
Object.keys(CALCS).forEach(k=>{
state[k]={};
CALCS[k].controls.forEach(c=>state[k][c.id]=c.value);
});
renderTabs();
renderControls();
update();
}

function renderTabs(){
tabs.innerHTML=Object.keys(CALCS).map(k=>
`<button class="tab ${k===active?'active':''}" onclick="switchTab('${k}')">${CALCS[k].label}</button>`
).join('');
}

function switchTab(k){
active=k;
renderTabs();
renderControls();
update();
}

function renderControls(){
let cfg=CALCS[active];
controls.innerHTML=cfg.controls.map(c=>`
<div class="control-group">
<label>${c.label}</label>
<input type="range" min="${c.min}" max="${c.max}" value="${state[active][c.id]}"
oninput="updateVal('${c.id}',this.value)">
</div>
`).join('');
}

function updateVal(id,val){
state[active][id]=Number(val);
update();
}

function update(){

if(active==="corpus"){
let m=state.corpus.expense;
let inf=state.corpus.inflation/100;
let y=state.corpus.years;

let future=m*Math.pow(1+inf,y);
let corpus=future*300;

result.innerText="₹"+Math.round(corpus).toLocaleString();
drawChart(y,corpus);
}

if(active==="fire"){
let exp=state.fire.expense;
let rate=state.fire.rate/100;

let corpus=exp/rate;

result.innerText="₹"+Math.round(corpus).toLocaleString();
drawChart(10,corpus);
}

}

let chart;

function drawChart(years,value){
let labels=[],data=[];
for(let i=1;i<=years;i++){
labels.push("Year "+i);
data.push(value*i/years);
}

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels,datasets:[{data,borderColor:"#00d4ff"}]},
options:{plugins:{legend:{display:false}}}
});
}

init();

fetch("components/navbar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("navbar").innerHTML=data;
});

</script>

</body>
</html>
