<!-- SAME FILE AS YOUR INVESTMENT FILE -->
<!-- ONLY CHANGES MARKED BELOW -->

<!-- 🔴 CHANGE 1: TITLE -->
<title>Retirement Dashboard — investpercent</title>

<!-- 🔴 CHANGE 2: HERO TEXT -->
<h1>Retirement <span class="grad">Planning Dashboard</span></h1>
<p>Plan your retirement corpus, income and financial independence with precision.</p>

<script>

const CALCS = {

corpus:{
label:"Corpus",
badge:"RETIREMENT",
title:"Retirement Corpus Planning",
sub:"Future expense adjusted planning",
desc:"Estimate retirement requirement",

wealthTitle:"Required Corpus",
wealthPill:"Future Value",

controls:[
{id:"expense",label:"Monthly Expense",min:10000,max:500000,step:1000,value:50000,format:"currency"},
{id:"inflation",label:"Inflation",min:1,max:10,step:0.1,value:6,format:"percent"},
{id:"years",label:"Years",min:1,max:40,step:1,value:25,format:"years"},
{id:"rate",label:"Return",min:1,max:15,step:0.1,value:10,format:"percent"}
]
},

fire:{
label:"FIRE",
badge:"FIRE MODE",
title:"Financial Independence",
sub:"Retire early calculation",
desc:"Based on 4% rule",

wealthTitle:"FIRE Corpus",
wealthPill:"Freedom Mode",

controls:[
{id:"expense",label:"Annual Expense",min:100000,max:5000000,step:50000,value:600000,format:"currency"},
{id:"withdrawal",label:"Withdrawal Rate",min:2,max:6,step:0.1,value:4,format:"percent"}
]
},

income:{
label:"Income",
badge:"POST RETIREMENT",
title:"Income Sustainability",
sub:"How long your money lasts",
desc:"Withdrawal simulation",

wealthTitle:"Income Phase",
wealthPill:"SWP Mode",

controls:[
{id:"corpus",label:"Corpus",min:1000000,max:50000000,step:100000,value:10000000,format:"currency"},
{id:"withdraw",label:"Monthly Withdrawal",min:10000,max:500000,step:5000,value:50000,format:"currency"},
{id:"rate",label:"Return",min:1,max:12,step:0.1,value:8,format:"percent"},
{id:"years",label:"Years",min:1,max:40,step:1,value:25,format:"years"}
]
}

};

function update(){

const s = state[active];
const cfg = CALCS[active];

$('modeHeadline').textContent = cfg.title;
$('modeSub').textContent = cfg.sub;

/* ===== CORPUS ===== */
if(active==="corpus"){

let m=s.expense;
let inf=s.inflation/100;
let y=s.years;

let future=m*Math.pow(1+inf,y);
let corpus=future*300;

setTop(corpus,future,s.rate);

setWealthArea({
title:"Retirement Corpus",
pill:"Future Value",
value:corpus,
narrative:`Your ₹${m.toLocaleString()} lifestyle becomes ₹${Math.round(future).toLocaleString()} in ${y} years. You need approx ₹${Math.round(corpus).toLocaleString()}.`,
stat1:{label:'Today Expense',value:fmtCurrency(m)},
stat2:{label:'Future Expense',value:fmtCurrency(future)},
stat3:{label:'Corpus',value:fmtCurrency(corpus)},
mood:"Planning",
power:"Inflation"
});

renderChart(
Array.from({length:y},(_,i)=>"Year "+(i+1)),
[
{label:"Expense Growth",data:Array.from({length:y},(_,i)=>m*Math.pow(1+inf,i+1)),color:"#ff607d"},
{label:"Corpus Target",data:Array.from({length:y},()=>corpus),color:"#00d4ff"}
],
cfg.chartTitle,
cfg.chartMeta
);

renderMilestones(cfg.timelineTitle,cfg.timelineMeta,
Array.from({length:4},(_,i)=>{
let yr=Math.floor((i+1)*y/4);
let val=m*Math.pow(1+inf,yr);
return{year:yr,value:val,note:"Expense grows"}
})
);

}

/* ===== FIRE ===== */
if(active==="fire"){

let corpus=s.expense/(s.withdrawal/100);

setTop(corpus,s.expense,s.withdrawal);

setWealthArea({
title:"FIRE Target",
pill:"Freedom",
value:corpus,
narrative:`You need ₹${Math.round(corpus).toLocaleString()} to retire.`,
stat1:{label:'Expense',value:fmtCurrency(s.expense)},
stat2:{label:'Corpus',value:fmtCurrency(corpus)},
stat3:{label:'Rule',value:"4%"},
mood:"Freedom",
power:"Passive"
});

renderChart(
["Now","Target"],
[{label:"Corpus",data:[0,corpus],color:"#00d4ff"}],
cfg.chartTitle,
cfg.chartMeta
);

}

/* ===== INCOME ===== */
if(active==="income"){

let corpus=s.corpus;
let r=s.rate/12/100;
let withdraw=s.withdraw;

let months=0;

while(corpus>0){
corpus=corpus*(1+r)-withdraw;
months++;
if(months>1000)break;
}

setTop(corpus,withdraw,s.rate);

setWealthArea({
title:"Income Sustainability",
pill:"Withdrawal",
value:months,
narrative:`Your money lasts ${months} months.`,
stat1:{label:'Corpus',value:fmtCurrency(s.corpus)},
stat2:{label:'Withdrawal',value:fmtCurrency(withdraw)},
stat3:{label:'Months',value:months},
mood:"Retirement",
power:"Cashflow"
});

renderChart(
Array.from({length:s.years},(_,i)=>"Year "+(i+1)),
[{label:"Corpus",data:Array.from({length:s.years},(_,i)=>s.corpus*(1-(i/s.years))),color:"#00d4ff"}],
cfg.chartTitle,
cfg.chartMeta
);

}

}

</script>
