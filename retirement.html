<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="css/navbar.css">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retirement Dashboard — investpercent</title>

<!-- SAME FONT + CHART -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ⚠️ COPY YOUR FULL CSS FROM investment.html HERE */
/* (DO NOT MODIFY — KEEP EXACT) */
</style>
</head>

<body>

<div class="page">
<div id="navbar"></div>

<!-- HERO -->
<section class="hero">
<div class="hero-top">
<div class="hero-copy">
<h1>Retirement <span class="grad">Planning Dashboard</span></h1>
<p>Plan your retirement corpus, income, and financial independence with precision.</p>
</div>
<div class="hero-cta">
<button class="btn primary" onclick="scrollToControls()">Start Planning</button>
<button class="btn secondary" onclick="openAdvisor()">Talk to Advisor</button>
</div>
</div>

<div class="tabbar" id="tabs"></div>

<div class="top-metrics">
<div class="metric-card">
<div class="metric-label">Mode</div>
<div class="metric-value cyan" id="modeHeadline">Retirement Corpus</div>
<div class="metric-sub" id="modeSub">Future planning</div>
</div>

<div class="metric-card">
<div class="metric-label">Corpus</div>
<div class="metric-value green" id="topProjected">₹0</div>
</div>

<div class="metric-card">
<div class="metric-label">Monthly</div>
<div class="metric-value cyan" id="topGains">₹0</div>
</div>

<div class="metric-card">
<div class="metric-label">Return</div>
<div class="metric-value gold" id="topRate">10%</div>
</div>
</div>
</section>

<!-- MAIN -->
<section class="layout">

<!-- LEFT -->
<aside class="panel controls" id="controlsAnchor">
<div class="panel-head">
<div>
<div class="panel-title">Control Panel</div>
<div class="panel-desc" id="controlDesc"></div>
</div>
<div class="badge" id="panelBadge"></div>
</div>

<div id="dynamicControls"></div>

<div class="advisor-card">
<button class="btn primary" onclick="openAdvisor()">Invest Now</button>
</div>
</aside>

<!-- RIGHT -->
<section class="panel dashboard">
<div class="wealth-card">
<div class="wealth-number"><span id="wealthNumber">₹0</span></div>
</div>

<div class="chart-card">
<canvas id="wealthChart"></canvas>
</div>
</section>

</section>
</div>

<script>

const CALCS = {

corpus:{
label:"Corpus",
badge:"RETIREMENT",
controls:[
{id:"expense",label:"Monthly Expense",min:10000,max:500000,value:50000},
{id:"years",label:"Years",min:1,max:40,value:25},
{id:"inflation",label:"Inflation",min:1,max:10,value:6}
]
},

fire:{
label:"FIRE",
badge:"FIRE",
controls:[
{id:"expense",label:"Annual Expense",min:100000,max:5000000,value:600000},
{id:"rate",label:"Withdrawal %",min:2,max:6,value:4}
]
}

};

let active="corpus";
let state={};

function init(){
Object.keys(CALCS).forEach(k=>{
state[k]={};
CALCS[k].controls.forEach(c=>state[k][c.id]=c.value);
});
renderTabs();
renderControls();
update();
}

function renderTabs(){
tabs.innerHTML=Object.keys(CALCS).map(k=>
`<button class="tab ${k===active?'active':''}" onclick="switchTab('${k}')">${CALCS[k].label}</button>`
).join('');
}

function switchTab(k){
active=k;
renderTabs();
renderControls();
update();
}

function renderControls(){
let cfg=CALCS[active];

panelBadge.textContent=cfg.badge;
dynamicControls.innerHTML=cfg.controls.map(c=>`
<div class="control-group">
<div>${c.label}</div>
<input type="range" min="${c.min}" max="${c.max}" value="${state[active][c.id]}"
oninput="updateVal('${c.id}',this.value)">
</div>
`).join('');
}

function updateVal(id,val){
state[active][id]=Number(val);
update();
}

function update(){

if(active==="corpus"){
let exp=state.corpus.expense;
let inf=state.corpus.inflation/100;
let y=state.corpus.years;

let future=exp*Math.pow(1+inf,y);
let corpus=future*300;

wealthNumber.innerText="₹"+Math.round(corpus).toLocaleString();
topProjected.innerText="₹"+Math.round(corpus).toLocaleString();
topGains.innerText="₹"+Math.round(future).toLocaleString();
}

if(active==="fire"){
let exp=state.fire.expense;
let rate=state.fire.rate/100;

let corpus=exp/rate;

wealthNumber.innerText="₹"+Math.round(corpus).toLocaleString();
topProjected.innerText="₹"+Math.round(corpus).toLocaleString();
topGains.innerText="₹"+Math.round(exp/12).toLocaleString();
}

}

init();

function openAdvisor(){
window.open("https://justinvesting.in");
}

function scrollToControls(){
controlsAnchor.scrollIntoView({behavior:"smooth"});
}

</script>

<script>
fetch("components/navbar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("navbar").innerHTML=data;
});
</script>

</body>
</html>
