<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment Calculators | InvestPercent</title>

  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/components.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div id="header"></div>
  <script src="../js/main.js"></script>
  <script>
    loadComponent("header", "../components/header.html");
  </script>

  <div class="page-shell">

    <section class="hero">
      <h1>Investment Calculators</h1>
      <p>Plan smarter. Grow faster.</p>
    </section>

    <div class="layout-3col">

      <aside class="sidebar">
        <h4>Calculators</h4>
        <a href="#sip" class="active">SIP</a>
        <a href="#lumpsum">Lumpsum</a>
        <a href="#goal">Goal Planner</a>
        <a href="#stepup">Step-Up SIP</a>
        <a href="#retirement">Retirement</a>
      </aside>

      <div class="main-card" id="sip">
        <h2>SIP Calculator</h2>

        <div class="input-grid">
          <div>
            <label for="sip_amt">Monthly Investment ₹</label>
            <input id="sip_amt" type="number" value="5000" min="500" step="500" />
          </div>

          <div>
            <label for="sip_years">Years</label>
            <input id="sip_years" type="number" value="10" min="1" step="1" />
          </div>

          <div class="full-width">
            <label for="sip_rate">Expected Return %</label>
            <input id="sip_rate" type="number" value="12" min="1" step="0.1" />
          </div>
        </div>

        <button class="btn-primary" onclick="calcSIP()">Calculate</button>
      </div>

      <div class="right-panel">
        <div class="result-bar">
          <div class="result-box">
            <p>Invested</p>
            <h3 id="sip_invested">₹0</h3>
          </div>

          <div class="result-box">
            <p>Returns</p>
            <h3 id="sip_returns">₹0</h3>
          </div>

          <div class="result-box total-box">
            <p>Total Value</p>
            <h3 id="sip_total">₹0</h3>
          </div>
        </div>

        <div class="chart-card">
          <p class="chart-title">Investment vs Wealth Created</p>
          <div class="chart-box">
            <canvas id="sip_chart"></canvas>
          </div>
        </div>

        <p class="subtle-note">
          This calculator estimates the future value of a monthly SIP using monthly compounding.
        </p>
      </div>

    </div>

  </div>

  <script>
    let sipChart;

    function formatINR(value) {
      return "₹" + Math.round(value).toLocaleString("en-IN");
    }

    function calcSIP() {
      const P = Number(document.getElementById("sip_amt").value || 0);
      const annualRate = Number(document.getElementById("sip_rate").value || 0);
      const years = Number(document.getElementById("sip_years").value || 0);

      const r = annualRate / 1200;
      const n = years * 12;

      let FV = 0;
      if (r === 0) {
        FV = P * n;
      } else {
        FV = P * (((Math.pow(1 + r, n) - 1) / r) * (1 + r));
      }

      const invested = P * n;
      const returns = FV - invested;

      document.getElementById("sip_invested").textContent = formatINR(invested);
      document.getElementById("sip_returns").textContent = formatINR(returns);
      document.getElementById("sip_total").textContent = formatINR(FV);

      if (sipChart) sipChart.destroy();

      sipChart = new Chart(document.getElementById("sip_chart"), {
        type: "doughnut",
        data: {
          labels: ["Invested", "Returns"],
          datasets: [{
            data: [invested, returns],
            backgroundColor: ["#38bdf8", "#22c55e"],
            borderColor: "#0b1220",
            borderWidth: 2,
            hoverOffset: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          cutout: "58%",
          plugins: {
            legend: {
              position: "top",
              labels: {
                color: "#cbd5e1",
                boxWidth: 14,
                boxHeight: 14,
                padding: 14,
                font: {
                  size: 11
                }
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return `${context.label}: ${formatINR(context.parsed)}`;
                }
              }
            }
          }
        }
      });
    }

    calcSIP();
  </script>

</body>
</html>
