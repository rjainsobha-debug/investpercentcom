<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Calculators | InvestPercent</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BASE ===== */
body{
margin:0;
font-family:Inter, sans-serif;
background:#07101d;
color:#e6f0ff;
}

/* ===== NAVBAR ===== */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 30px;
background:#07101d;
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-weight:700;
}

.nav-links a{
margin-left:12px;
padding:8px 14px;
border-radius:20px;
background:#0f1b2e;
color:#cfe3ff;
text-decoration:none;
font-size:14px;
}

.nav-links a.active{
background:#00d09c;
color:#00221a;
}

/* ===== PAGE WIDTH FIX ===== */
.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* ===== HERO ===== */
.hero{
background:linear-gradient(135deg,#0f2b3a,#112d4e);
padding:22px;
border-radius:18px;
margin-bottom:20px;
}

.hero h1{
margin:0;
font-size:24px;
}

.hero p{
color:#9fb4d4;
margin-top:5px;
}

/* ===== LAYOUT ===== */
.layout{
display:grid;
grid-template-columns:260px 1fr;
gap:20px;
}

/* ===== SIDEBAR ===== */
.sidebar{
background:#0e1828;
border-radius:18px;
padding:15px;
}

.sidebar h4{
font-size:12px;
color:#8aa0bf;
margin-bottom:10px;
}

.side-card{
display:flex;
gap:10px;
padding:12px;
border-radius:14px;
margin-bottom:10px;
background:#121f34;
cursor:pointer;
}

.side-card:hover{
background:#00d09c20;
}

.side-num{
width:26px;
height:26px;
border-radius:50%;
background:#00d09c;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
color:#00221a;
}

/* ===== MAIN CARD ===== */
.card{
background:#0f1b2e;
border-radius:18px;
padding:20px;
}

/* ===== INPUTS ===== */
.input-group{
margin-bottom:18px;
}

label{
font-size:13px;
color:#9fb4d4;
}

input[type=range]{
width:100%;
accent-color:#00d09c;
}

.range-value{
font-size:12px;
color:#9fb4d4;
margin-top:4px;
}

/* ===== BUTTON ===== */
.btn{
background:#00d09c;
border:none;
width:100%;
padding:12px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

/* ===== RESULTS ===== */
.results{
display:flex;
gap:10px;
margin-top:15px;
}

.result-box{
flex:1;
background:#08111f;
padding:10px;
border-radius:10px;
font-size:13px;
}

/* ===== CHART ===== */
.chart{
max-width:220px;
margin:20px auto;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
.layout{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">InvestPercent</div>

<div class="nav-links">
<a href="#">Home</a>
<a class="active">Investment</a>
<a>Savings</a>
<a>Loans</a>
<a>Retirement</a>
</div>
</div>

<div class="container">

<!-- HERO -->
<div class="hero">
<h1>Investment Calculators</h1>
<p>Plan SIP, lumpsum, CAGR & wealth growth in one place</p>
</div>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">

<h4>JUMP TO</h4>

<div class="side-card">
<div class="side-num">1</div>
<div>SIP Calculator</div>
</div>

<div class="side-card">
<div class="side-num">2</div>
<div>Lumpsum</div>
</div>

<div class="side-card">
<div class="side-num">3</div>
<div>CAGR</div>
</div>

<div class="side-card">
<div class="side-num">4</div>
<div>SWP</div>
</div>

<div class="side-card">
<div class="side-num">5</div>
<div>PPF</div>
</div>

</div>

<!-- MAIN -->
<div class="card">

<h2>SIP Calculator</h2>

<div class="input-group">
<label>Monthly Investment ₹</label>
<input type="range" id="amount" min="1000" max="50000" value="5000" oninput="amtVal.innerText=this.value">
<div class="range-value">₹<span id="amtVal">5000</span></div>
</div>

<div class="input-group">
<label>Return %</label>
<input type="range" id="rate" min="5" max="20" value="12" oninput="rateVal.innerText=this.value">
<div class="range-value"><span id="rateVal">12</span>%</div>
</div>

<div class="input-group">
<label>Years</label>
<input type="range" id="years" min="1" max="30" value="10" oninput="yearVal.innerText=this.value">
<div class="range-value"><span id="yearVal">10</span></div>
</div>

<button class="btn" onclick="calc()">Calculate</button>

<div class="results">
<div class="result-box" id="invested"></div>
<div class="result-box" id="returns"></div>
<div class="result-box" id="total"></div>
</div>

<div class="chart">
<canvas id="chart"></canvas>
</div>

</div>

</div>

</div>

<script>

let chart;

function calc(){

let m=amount.value;
let r=rate.value/100/12;
let n=years.value*12;

let fv=m*((Math.pow(1+r,n)-1)/r)*(1+r);
let invested=m*n;

document.getElementById("invested").innerHTML="Invested ₹"+invested.toLocaleString();
document.getElementById("returns").innerHTML="Returns ₹"+Math.round(fv-invested).toLocaleString();
document.getElementById("total").innerHTML="Total ₹"+Math.round(fv).toLocaleString();

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Invested","Returns"],
datasets:[{
data:[invested,fv-invested],
backgroundColor:["#38bdf8","#00d09c"]
}]
},
options:{plugins:{legend:{display:false}}}
});

}

calc();

</script>

</body>
</html>
