<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Investment Calculators | InvestPercent</title>

<!-- ✅ CORRECT CSS PATH (ROOT FILE) -->
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/components.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
  background:#020617;
  color:white;
  font-family:system-ui;
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:#020617;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-links a{
  margin-left:10px;
  padding:8px 14px;
  border-radius:20px;
  background:#111827;
  text-decoration:none;
  color:white;
}

/* ===== CONTAINER ===== */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* ===== HERO ===== */
.hero{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  padding:25px;
  border-radius:16px;
  margin-bottom:25px;
}

/* ===== GRID ===== */
.layout{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:20px;
}

/* ===== SIDEBAR ===== */
.sidebar{
  background:#0f172a;
  border-radius:14px;
  padding:15px;
}

.side-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  background:#111827;
}

.num{
  background:#10b981;
  width:25px;
  height:25px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ===== CARD ===== */
.card{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
}

/* ===== INPUT ===== */
input[type=range]{
  width:100%;
}

/* ===== RESULT ===== */
.results{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.box{
  flex:1;
  background:#020617;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* ===== CHART ===== */
.chart{
  max-width:220px;
  margin:auto;
}

/* ===== CTA ===== */
.cta{
  margin-top:20px;
  padding:20px;
  background:#020617;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
}

.cta button{
  background:#10b981;
  border:none;
  padding:10px 20px;
  border-radius:10px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .layout{
    grid-template-columns:1fr;
  }
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>InvestPercent</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a class="active">Investment</a>
    <a href="pages/savings.html">Savings</a>
    <a href="pages/loans.html">Loans</a>
    <a href="pages/retirement.html">Retirement</a>
  </div>
</div>

<div class="container">

<!-- HERO -->
<div class="hero">
  <h2>Investment Calculators</h2>
  <p>Plan SIP, lumpsum & wealth growth</p>
</div>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="side-item"><div class="num">1</div>SIP</div>
  <div class="side-item"><div class="num">2</div>Lumpsum</div>
  <div class="side-item"><div class="num">3</div>CAGR</div>
  <div class="side-item"><div class="num">4</div>SWP</div>
  <div class="side-item"><div class="num">5</div>PPF</div>
</div>

<!-- MAIN -->
<div>

<div class="card">
<h3>SIP Calculator</h3>

<label>Monthly ₹</label>
<input type="range" id="amt" value="5000" min="500" max="100000">

<label>Return %</label>
<input type="range" id="rate" value="12" min="1" max="20">

<label>Years</label>
<input type="range" id="years" value="10" min="1" max="30">

<button onclick="calc()">Calculate</button>

<div class="results">
<div class="box" id="i"></div>
<div class="box" id="r"></div>
<div class="box" id="t"></div>
</div>

<div class="chart">
<canvas id="c"></canvas>
</div>

</div>

<div class="cta">
<div>Want real investment plan?</div>
<button onclick="window.open('https://justinvesting.in')">Talk to Advisor</button>
</div>

</div>

</div>

</div>

<script>

function calc(){
let P=amt.value;
let r=rate.value/100/12;
let n=years.value*12;

let FV=P*((Math.pow(1+r,n)-1)/r)*(1+r);

let invested=P*n;
let gain=FV-invested;

i.innerHTML="₹"+invested.toFixed(0);
r.innerHTML="₹"+gain.toFixed(0);
t.innerHTML="₹"+FV.toFixed(0);

new Chart(c,{
type:'doughnut',
data:{
labels:["Invested","Returns"],
datasets:[{
data:[invested,gain],
backgroundColor:["#38bdf8","#10b981"]
}]
}
});
}

</script>

</body>
</html>
