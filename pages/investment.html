<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="../css/components.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="header"></div>
<script src="../js/main.js"></script>
<script>
loadComponent("header", "../components/header.html");
</script>

<div class="page-shell">

<section class="hero">
  <h1>Investment Calculators</h1>
  <p>Plan smarter. Grow faster.</p>
</section>

<div class="layout">

<aside class="sidebar">
  <div class="side-card">
    <h4>Calculators</h4>
    <a href="#sip">SIP</a>
  </div>
</aside>

<main class="main">

<section class="calc-card">

<div class="calc-grid">

<div class="panel">

<label>Monthly Investment ₹</label>
<input id="sip_amt" value="5000">

<label>Years</label>
<input id="sip_years" value="10">

<label>Return %</label>
<input id="sip_rate" value="12">

<button class="btn-primary" onclick="calcSIP()">Calculate</button>

</div>

<div class="panel">

<div class="result-panel">

<div class="result-summary">

<div class="result-item">
<span>Invested</span>
<strong id="sip_invested">₹0</strong>
</div>

<div class="result-item">
<span>Returns</span>
<strong id="sip_returns">₹0</strong>
</div>

<div class="result-item total">
<span>Total</span>
<strong id="sip_total">₹0</strong>
</div>

</div>

<div class="chart-box">
<canvas id="sip_chart"></canvas>
</div>

</div>

</div>

</div>

</section>

</main>
</div>
</div>

<script>

let sipChart;

function calcSIP(){
let P=+sip_amt.value;
let r=+sip_rate.value/1200;
let n=+sip_years.value*12;

let FV=P*((Math.pow(1+r,n)-1)/r)*(1+r);

let invested=P*n;
let returns=FV-invested;

sip_invested.innerHTML="₹"+invested.toFixed(0);
sip_returns.innerHTML="₹"+returns.toFixed(0);
sip_total.innerHTML="₹"+FV.toFixed(0);

if(sipChart) sipChart.destroy();

sipChart=new Chart(sip_chart,{
type:"doughnut",
data:{
labels:["Invested","Returns"],
datasets:[{
data:[invested,returns],
backgroundColor:["#38bdf8","#00d09c"]
}]
}
});
}

</script>

</body>
</html>
