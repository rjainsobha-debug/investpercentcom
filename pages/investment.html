<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Investment Calculators</title>

<style>

body{
background:#041424;
color:#fff;
font-family:Inter;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:25px;
}

.card{
background:#0b2d4d;
padding:20px;
border-radius:20px;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
margin-top:12px;
padding:12px;
width:100%;
background:#32c7ff;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#27a6d4;
}

.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Investment Calculators</h1>

<!-- SIP -->
<div class="card">

<h2>SIP Calculator</h2>

<input id="sipAmount" placeholder="Monthly Investment ₹">
<input id="sipRate" placeholder="Return %">
<input id="sipYears" placeholder="Years">

<button onclick="calcSIP()">Calculate</button>

<div id="sipResult" class="result"></div>
<canvas id="sipChart"></canvas>

</div>

<!-- LUMPSUM -->
<div class="card">

<h2>Lumpsum Calculator</h2>

<input id="lumpAmount" placeholder="Investment ₹">
<input id="lumpRate" placeholder="Return %">
<input id="lumpYears" placeholder="Years">

<button onclick="calcLump()">Calculate</button>

<div id="lumpResult" class="result"></div>
<canvas id="lumpChart"></canvas>

</div>

<!-- CAGR -->
<div class="card">

<h2>CAGR Calculator</h2>

<input id="startValue" placeholder="Start Value ₹">
<input id="endValue" placeholder="End Value ₹">
<input id="years" placeholder="Years">

<button onclick="calcCAGR()">Calculate</button>

<div id="cagrResult" class="result"></div>

</div>

<!-- PPF -->
<div class="card">

<h2>PPF Calculator</h2>

<input id="ppfAmount" placeholder="Yearly Investment ₹">
<input id="ppfYears" placeholder="Years">
<input id="ppfRate" placeholder="Interest %" value="7.1">

<button onclick="calcPPF()">Calculate</button>

<div id="ppfResult" class="result"></div>
<canvas id="ppfChart"></canvas>

</div>

</div>

<script>

// SIP
function calcSIP(){
let P=+sipAmount.value;
let r=+sipRate.value/100/12;
let n=+sipYears.value*12;

let future=P*((Math.pow(1+r,n)-1)/r)*(1+r);
let invested=P*n;

sipResult.innerHTML="Future Value: ₹"+Math.round(future);

new Chart(sipChart,{
type:'pie',
data:{
labels:['Invested','Returns'],
datasets:[{data:[invested,future-invested]}]
}
});
}

// LUMPSUM
function calcLump(){
let P=+lumpAmount.value;
let r=+lumpRate.value/100;
let n=+lumpYears.value;

let future=P*Math.pow(1+r,n);

lumpResult.innerHTML="Future Value: ₹"+Math.round(future);

new Chart(lumpChart,{
type:'pie',
data:{
labels:['Principal','Returns'],
datasets:[{data:[P,future-P]}]
}
});
}

// CAGR
function calcCAGR(){
let start=+startValue.value;
let end=+endValue.value;
let n=+years.value;

let cagr=(Math.pow(end/start,1/n)-1)*100;

cagrResult.innerHTML="CAGR: "+cagr.toFixed(2)+"%";
}

// PPF
function calcPPF(){
let yearly=+ppfAmount.value;
let years=+ppfYears.value;
let rate=+ppfRate.value/100;

let total=0;
let invested=0;

for(let i=0;i<years;i++){
total=(total+yearly)*(1+rate);
invested+=yearly;
}

ppfResult.innerHTML="Maturity Value: ₹"+Math.round(total);

new Chart(ppfChart,{
type:'pie',
data:{
labels:['Invested','Interest'],
datasets:[{data:[invested,total-invested]}]
}
});
}

</script>

</body>
</html>
