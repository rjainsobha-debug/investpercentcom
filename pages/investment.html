<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Investment Tools — investpercent ELITE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0a0e1a;
--card:rgba(255,255,255,0.05);
--accent:#00d4ff;
--accent2:#7b61ff;
--green:#00e676;
--text:#fff;
--muted:#9aa4c7;
}

body{
margin:0;
font-family:'Inter';
background:var(--bg);
color:var(--text);
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

h1{
font-family:'Poppins';
font-size:32px;
}

.card{
background:var(--card);
border-radius:18px;
padding:25px;
margin-bottom:40px;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
border-color:var(--accent);
}

.input-group{
margin-bottom:15px;
}

label{
font-size:13px;
color:var(--muted);
}

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:none;
background:#141d35;
color:#fff;
}

.range{
width:100%;
}

button{
margin-top:10px;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
cursor:pointer;
font-weight:600;
width:100%;
}

.result{
margin-top:20px;
padding:20px;
background:#141d35;
border-radius:12px;
display:none;
}

.metric{
font-size:22px;
font-weight:600;
color:var(--green);
}

.table{
margin-top:20px;
width:100%;
border-collapse:collapse;
font-size:13px;
}

.table td{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.cta{
margin-top:20px;
padding:18px;
text-align:center;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
border-radius:12px;
cursor:pointer;
color:#000;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h1>Investment Calculators — ELITE</h1>

<!-- SIP -->
<div class="card">

<h2>SIP Calculator</h2>

<div class="input-group">
<label>Monthly Investment (₹)</label>
<input id="sipAmt" type="number" value="10000">
<input class="range" type="range" min="1000" max="100000" value="10000" oninput="sync(this,'sipAmt')">
</div>

<div class="input-group">
<label>Return (%)</label>
<input id="sipRate" type="number" value="12">
<input class="range" type="range" min="1" max="20" value="12" oninput="sync(this,'sipRate')">
</div>

<div class="input-group">
<label>Years</label>
<input id="sipYears" type="number" value="10">
<input class="range" type="range" min="1" max="40" value="10" oninput="sync(this,'sipYears')">
</div>

<button onclick="calcSIP()">Calculate SIP</button>

<div id="sipResult" class="result">
<div class="metric" id="sipValue"></div>
<canvas id="sipChart"></canvas>
<table class="table" id="sipTable"></table>

<div class="cta" onclick="goInvest()">
Start SIP Now →
</div>
</div>

</div>

<!-- LUMPSUM -->
<div class="card">

<h2>Lump Sum Calculator</h2>

<input id="lumpAmt" type="number" placeholder="Amount">
<input id="lumpRate" type="number" placeholder="Return %">
<input id="lumpYears" type="number" placeholder="Years">

<button onclick="calcLump()">Calculate</button>

<div id="lumpResult" class="result">
<div class="metric" id="lumpValue"></div>
<canvas id="lumpChart"></canvas>
</div>

</div>

<!-- CAGR -->
<div class="card">

<h2>CAGR Calculator</h2>

<input id="start" placeholder="Start Value">
<input id="end" placeholder="End Value">
<input id="yrs" placeholder="Years">

<button onclick="calcCAGR()">Calculate</button>

<div id="cagrResult" class="result">
<div class="metric" id="cagrVal"></div>
</div>

</div>

</div>

<script>

function sync(slider,inputId){
document.getElementById(inputId).value = slider.value;
}

/* SIP */
function calcSIP(){
let P = +sipAmt.value;
let r = sipRate.value/100/12;
let n = sipYears.value*12;

let M = P*((Math.pow(1+r,n)-1)/r)*(1+r);

document.getElementById("sipResult").style.display="block";
animate("sipValue",M);

renderChart("sipChart",[P*n,M]);

buildTable(P,r,n);
}

/* TABLE */
function buildTable(P,r,n){
let table="";
let total=0;

for(let i=1;i<=n;i++){
total = total*(1+r)+P;
if(i%12==0){
table+=`<tr><td>Year ${i/12}</td><td>₹${Math.round(total)}</td></tr>`;
}
}
document.getElementById("sipTable").innerHTML=table;
}

/* LUMP */
function calcLump(){
let P = +lumpAmt.value;
let r = lumpRate.value/100;
let t = lumpYears.value;

let A = P*Math.pow((1+r),t);

document.getElementById("lumpResult").style.display="block";
animate("lumpValue",A);
renderChart("lumpChart",[P,A]);
}

/* CAGR */
function calcCAGR(){
let s = +start.value;
let e = +end.value;
let y = +yrs.value;

let cagr = (Math.pow(e/s,1/y)-1)*100;

document.getElementById("cagrResult").style.display="block";
animate("cagrVal",cagr,"%",2);
}

/* CHART */
function renderChart(id,data){
new Chart(document.getElementById(id),{
type:'bar',
data:{
labels:["Invested","Value"],
datasets:[{
data:data
}]
}
});
}

/* ANIMATION */
function animate(id,value,suffix="₹",dec=0){
let el=document.getElementById(id);
let start=0;
let step=value/60;

let counter=setInterval(()=>{
start+=step;
if(start>=value){
start=value;
clearInterval(counter);
}
el.innerText = suffix==="₹" 
? "₹"+Math.round(start) 
: start.toFixed(dec)+"%";
},20);
}

/* CTA */
function goInvest(){
window.open("https://justinvesting.in","_blank");
}

</script>

</body>
</html>
