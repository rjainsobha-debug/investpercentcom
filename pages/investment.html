<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="../css/components.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="header"></div>
<script src="../js/main.js"></script>
<script>
loadComponent("header", "../components/header.html");
</script>

<div class="page-shell">

<section class="hero">
  <h1>Investment Calculators</h1>
  <p>Plan smarter. Grow faster.</p>
</section>

<div class="main-card">

<h2>SIP Calculator</h2>

<div class="input-grid">

<div>
<label>Monthly Investment ₹</label>
<input id="sip_amt" value="5000">
</div>

<div>
<label>Years</label>
<input id="sip_years" value="10">
</div>

<div>
<label>Return %</label>
<input id="sip_rate" value="12">
</div>

</div>

<button class="btn-primary" onclick="calcSIP()">Calculate</button>

<div class="result-bar">

<div>
<p>Invested</p>
<h3 id="sip_invested">₹0</h3>
</div>

<div>
<p>Returns</p>
<h3 id="sip_returns">₹0</h3>
</div>

<div class="total-box">
<p>Total</p>
<h3 id="sip_total">₹0</h3>
</div>

</div>

<div class="chart-box">
<canvas id="sip_chart"></canvas>
</div>

</div>

</div>

<script>
let sipChart;

function calcSIP(){
let P=+sip_amt.value;
let r=+sip_rate.value/1200;
let n=+sip_years.value*12;

let FV=P*((Math.pow(1+r,n)-1)/r)*(1+r);

let invested=P*n;
let returns=FV-invested;

sip_invested.innerHTML="₹"+invested.toFixed(0);
sip_returns.innerHTML="₹"+returns.toFixed(0);
sip_total.innerHTML="₹"+FV.toFixed(0);

if(sipChart) sipChart.destroy();

sipChart=new Chart(sip_chart,{
type:"doughnut",
data:{
labels:["Invested","Returns"],
datasets:[{
data:[invested,returns],
backgroundColor:["#38bdf8","#22c55e"]
}]
}
});
}
</script>

</body>
</html>
