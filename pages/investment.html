<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Calculators | InvestPercent</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:Inter,system-ui;
background:linear-gradient(180deg,#07101d,#08111f);
color:#eaf2ff;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* ===== NAVBAR ===== */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:#07101d;
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-weight:800;
font-size:18px;
}

.nav-links a{
margin-left:10px;
padding:8px 14px;
border-radius:20px;
background:#0f1b2e;
text-decoration:none;
color:#cfe3ff;
font-size:14px;
}

.nav-links a.active{
background:#00d09c;
color:#001b13;
}

/* ===== HERO ===== */
.hero{
background:linear-gradient(135deg,#0f2b3a,#10294a);
padding:22px;
border-radius:20px;
margin-bottom:20px;
}

.hero h1{
margin:0;
font-size:26px;
}

.hero p{
color:#a9bdd7;
}

/* ===== LAYOUT ===== */
.layout{
display:grid;
grid-template-columns:260px 1fr;
gap:20px;
}

/* ===== SIDEBAR ===== */
.sidebar{
background:#0e1828;
border-radius:18px;
padding:15px;
}

.sidebar h3{
font-size:12px;
color:#8fa6c4;
letter-spacing:1px;
}

.side-item{
display:flex;
gap:10px;
padding:12px;
margin-top:10px;
border-radius:12px;
background:#121f34;
cursor:pointer;
}

.side-item:hover{
background:#00d09c20;
}

.side-num{
width:26px;
height:26px;
border-radius:50%;
background:#00d09c;
display:flex;
align-items:center;
justify-content:center;
color:#001b13;
font-size:12px;
font-weight:bold;
}

/* ===== CARD ===== */
.card{
background:#0f1b2e;
border-radius:20px;
padding:18px;
}

.card h2{
margin-top:0;
}

/* ===== INPUT ===== */
.input-group{
margin-bottom:15px;
}

input[type=range]{
width:100%;
}

input[type=number]{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #24364f;
background:#0b1423;
color:white;
}

/* ===== BUTTON ===== */
.btn{
background:#00d09c;
border:none;
padding:12px;
width:100%;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

/* ===== RESULTS ===== */
.results{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.result-box{
background:#08111f;
padding:10px;
border-radius:10px;
font-size:14px;
}

/* ===== CHART ===== */
.chart{
max-width:260px;
margin:auto;
}

/* ===== CTA ===== */
.cta{
margin-top:15px;
padding:15px;
border-radius:14px;
background:#00d09c20;
display:flex;
justify-content:space-between;
align-items:center;
}

.cta a{
background:#00d09c;
padding:10px 16px;
border-radius:10px;
text-decoration:none;
color:#002219;
font-weight:bold;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
.layout{
grid-template-columns:1fr;
}
.sidebar{
order:2;
}
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo">InvestPercent</div>
<div class="nav-links">
<a href="#">Home</a>
<a class="active">Investment</a>
<a>Savings</a>
<a>Loans</a>
</div>
</div>

<div class="container">

<!-- HERO -->
<div class="hero">
<h1>Investment Calculators</h1>
<p>Plan SIP, lumpsum, CAGR & wealth growth in one place</p>
</div>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>JUMP TO</h3>

<div class="side-item">
<div class="side-num">1</div>
<div>SIP Calculator</div>
</div>

<div class="side-item">
<div class="side-num">2</div>
<div>Lumpsum</div>
</div>

<div class="side-item">
<div class="side-num">3</div>
<div>CAGR</div>
</div>

<div class="side-item">
<div class="side-num">4</div>
<div>SWP</div>
</div>

<div class="side-item">
<div class="side-num">5</div>
<div>PPF</div>
</div>

</div>

<!-- MAIN -->
<div>

<div class="card">
<h2>SIP Calculator</h2>

<div class="input-group">
<label>Monthly Investment ₹</label>
<input type="range" id="sipAmount" min="1000" max="100000" value="5000">
</div>

<div class="input-group">
<label>Return %</label>
<input type="range" id="sipRate" min="1" max="20" value="12">
</div>

<div class="input-group">
<label>Years</label>
<input type="range" id="sipYears" min="1" max="30" value="10">
</div>

<button class="btn" onclick="calc()">Calculate</button>

<div class="results">
<div class="result-box" id="invested"></div>
<div class="result-box" id="returns"></div>
</div>

<div class="chart">
<canvas id="chart"></canvas>
</div>

<div class="cta">
<div>Want expert SIP advice?</div>
<a href="https://justinvesting.in">Start →</a>
</div>

</div>

</div>

</div>

</div>

<script>

let chart;

function calc(){

let m = sipAmount.value;
let r = sipRate.value/100/12;
let n = sipYears.value*12;

let fv = m*((Math.pow(1+r,n)-1)/r)*(1+r);
let invested = m*n;

investedDiv.innerHTML="Invested ₹"+invested.toLocaleString();
returnsDiv.innerHTML="Returns ₹"+Math.round(fv-invested).toLocaleString();

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Invested","Returns"],
datasets:[{
data:[invested,fv-invested],
backgroundColor:["#38bdf8","#00d09c"]
}]
}
});

}

calc();

</script>

</body>
</html>
