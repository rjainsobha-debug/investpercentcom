<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Tools — investpercent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0a0e1a;
--card:#0f1628;
--accent:#00d4ff;
--accent2:#7b61ff;
--green:#00e676;
--text:#fff;
--muted:#9aa4c7;
}

body{
margin:0;
font-family:'Inter';
background:var(--bg);
color:var(--text);
}

.container{
padding:40px;
max-width:1200px;
margin:auto;
}

h1{
font-family:'Poppins';
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.04);
padding:25px;
border-radius:16px;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#141d35;
color:#fff;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
cursor:pointer;
font-weight:600;
}

.result{
margin-top:20px;
padding:20px;
background:#141d35;
border-radius:12px;
}

.cta{
margin-top:20px;
padding:20px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
border-radius:12px;
color:#000;
text-align:center;
cursor:pointer;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h1>Investment Calculators</h1>

<!-- SIP -->
<div class="card">
<h2>SIP Calculator</h2>

<input id="sipAmount" type="number" placeholder="Monthly Investment ₹">
<input id="sipRate" type="number" placeholder="Expected Return %">
<input id="sipYears" type="number" placeholder="Years">

<button onclick="calcSIP()">Calculate</button>

<div class="result" id="sipResult"></div>
<canvas id="sipChart"></canvas>

<div class="cta" onclick="goInvest()">
Start Investing Now → 
</div>
</div>

<!-- LUMPSUM -->
<div class="card">
<h2>Lump Sum Calculator</h2>

<input id="lumpAmount" type="number" placeholder="Investment Amount ₹">
<input id="lumpRate" type="number" placeholder="Return %">
<input id="lumpYears" type="number" placeholder="Years">

<button onclick="calcLump()">Calculate</button>

<div class="result" id="lumpResult"></div>
<canvas id="lumpChart"></canvas>

</div>

<!-- CAGR -->
<div class="card">
<h2>CAGR Calculator</h2>

<input id="startVal" type="number" placeholder="Initial Value">
<input id="endVal" type="number" placeholder="Final Value">
<input id="years" type="number" placeholder="Years">

<button onclick="calcCAGR()">Calculate</button>

<div class="result" id="cagrResult"></div>

</div>

</div>

<script>

function calcSIP(){
let P = +document.getElementById('sipAmount').value;
let r = +document.getElementById('sipRate').value/100/12;
let n = +document.getElementById('sipYears').value*12;

let M = P * ((Math.pow(1+r,n)-1)/r)*(1+r);

document.getElementById('sipResult').innerHTML =
"Future Value: ₹" + M.toFixed(0);

renderChart("sipChart",[P*n,M]);
}

function calcLump(){
let P = +document.getElementById('lumpAmount').value;
let r = +document.getElementById('lumpRate').value/100;
let t = +document.getElementById('lumpYears').value;

let A = P*Math.pow((1+r),t);

document.getElementById('lumpResult').innerHTML =
"Maturity Value: ₹" + A.toFixed(0);

renderChart("lumpChart",[P,A]);
}

function calcCAGR(){
let start = +document.getElementById('startVal').value;
let end = +document.getElementById('endVal').value;
let years = +document.getElementById('years').value;

let cagr = Math.pow((end/start),(1/years))-1;

document.getElementById('cagrResult').innerHTML =
"CAGR: " + (cagr*100).toFixed(2) + "%";
}

function renderChart(id,data){
new Chart(document.getElementById(id),{
type:'bar',
data:{
labels:["Invested","Value"],
datasets:[{
data:data
}]
}
});
}

function goInvest(){
window.open("https://justinvesting.in","_blank");
}

</script>

</body>
</html>
