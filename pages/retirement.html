<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retirement Planning | InvestPercent</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="../css/components.css">

</head>

<body>

<header class="site-header">
  <div class="nav-shell">
    <a href="../index.html" class="brand">
      <div class="brand-mark"><i class="fa-solid fa-chart-line"></i></div>
      <div>
        <div class="brand-title">InvestPercent</div>
        <div class="brand-sub">Your complete financial universe</div>
      </div>
    </a>

    <nav class="top-nav">
      <a href="../index.html">Home</a>
      <a href="./investment.html">Investment</a>
      <a href="./savings.html">Savings</a>
      <a href="./tax.html">Tax</a>
      <a href="./loans.html">Loans</a>
      <a href="./retirement.html" class="active">Retirement</a>
    </nav>
  </div>
</header>

<div class="page-shell">

<section class="hero">
  <h1>Retirement Planning</h1>
  <p>Know your number. Build your freedom.</p>
</section>

<div class="layout">

<aside class="sidebar">
  <div class="side-card">
    <div class="side-title">Jump</div>
    <a class="anchor-link" href="#corpus">Corpus</a>
    <a class="anchor-link" href="#fire">FIRE</a>
  </div>
</aside>

<main class="main">

<!-- ================= CORPUS ================= -->
<section class="calc-card" id="corpus">
  <div class="calc-header">
    <h2>Retirement Corpus Calculator</h2>
  </div>

  <div class="calc-body">
    <div class="calc-grid">

      <div class="panel">
        <input id="age" value="30" placeholder="Current Age">
        <input id="retAge" value="60" placeholder="Retirement Age">
        <input id="expense" value="60000" placeholder="Monthly Expense ₹">
        <input id="inflation" value="6" placeholder="Inflation %">
        <input id="return" value="10" placeholder="Return %">
        <input id="savings" value="500000" placeholder="Current Savings">

        <button class="btn btn-primary" onclick="calcCorpus()">Calculate</button>
      </div>

      <div class="panel">
        <div id="corpus_result" class="result-box"></div>
        <canvas id="corpus_chart"></canvas>
      </div>

    </div>
  </div>
</section>

<!-- ================= FIRE ================= -->
<section class="calc-card" id="fire">
  <div class="calc-header">
    <h2>FIRE Calculator</h2>
  </div>

  <div class="calc-body">
    <div class="calc-grid">

      <div class="panel">
        <input id="fire_exp" value="60000" placeholder="Monthly Expense">
        <input id="fire_save" value="500000" placeholder="Savings">
        <input id="fire_inv" value="30000" placeholder="Monthly Invest">
        <input id="fire_ret" value="10" placeholder="Return %">
        <input id="fire_age" value="30" placeholder="Age">

        <button class="btn btn-primary" onclick="calcFIRE()">Calculate</button>
      </div>

      <div class="panel">
        <div id="fire_result" class="result-box"></div>

        <div class="progress-bar">
          <div id="progress_fill" class="progress-fill"></div>
        </div>

        <canvas id="fire_chart"></canvas>
      </div>

    </div>
  </div>
</section>

</main>
</div>
</div>

<script>

// ================= CORPUS =================
function calcCorpus(){

let age=+age.value;
let ret=+retAge.value;
let exp=+expense.value;
let inf=+inflation.value/100;
let r=+return.value/100;
let sav=+savings.value;

let years=ret-age;

let futureExp=exp*Math.pow(1+inf,years);
let corpus=futureExp*12*25;

corpus_result.innerHTML = `
<b>Corpus Needed:</b> ₹${corpus.toFixed(0)}<br>
<b>Future Expense:</b> ₹${futureExp.toFixed(0)}
`;

new Chart(document.getElementById("corpus_chart"),{
type:"line",
data:{
labels:[age,ret],
datasets:[{
label:"Corpus Growth",
data:[sav,corpus],
borderColor:"#00d09c"
}]
}
});
}

// ================= FIRE =================
function calcFIRE(){

let exp=+fire_exp.value;
let save=+fire_save.value;
let inv=+fire_inv.value;
let r=+fire_ret.value/100;
let age=+fire_age.value;

let fireNumber=exp*12*25;

let years=0;
let corpus=save;

while(corpus<fireNumber){
 corpus=corpus*(1+r)+inv*12;
 years++;
 if(years>60) break;
}

let progress=(save/fireNumber)*100;

fire_result.innerHTML = `
<b>FIRE Number:</b> ₹${fireNumber.toFixed(0)}<br>
<b>Years:</b> ${years}<br>
<b>Age:</b> ${age+years}
`;

document.getElementById("progress_fill").style.width = progress+"%";

new Chart(document.getElementById("fire_chart"),{
type:"line",
data:{
labels:["Start","FIRE"],
datasets:[{
label:"Wealth",
data:[save,fireNumber],
borderColor:"#38bdf8"
}]
}
});
}

</script>

</body>
</html>
