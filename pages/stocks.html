<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Stock Market Calculators</title>

<style>

body{
background:#041424;
color:#fff;
font-family:Inter;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#0b2d4d;
padding:20px;
border-radius:16px;
margin-bottom:25px;
}

input, select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

button{
margin-top:12px;
padding:12px;
width:100%;
background:#32c7ff;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.col{
flex:1;
min-width:150px;
}

.sidebar{
position:fixed;
top:100px;
left:10px;
}

.sidebar a{
display:block;
margin:5px 0;
color:#32c7ff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="sidebar">
<a href="#stock-return">Return</a>
<a href="#pe">P/E</a>
<a href="#portfolio">Portfolio</a>
<a href="#broker">Brokerage</a>
</div>

<div class="container">

<h1>Stock Market Tools</h1>

<!-- TOOL 1 -->
<div class="card" id="stock-return">

<h2>Stock Return Calculator</h2>

<div class="row">
<div class="col"><input id="buy" placeholder="Buy Price"></div>
<div class="col"><input id="sell" placeholder="Sell Price"></div>
</div>

<input id="qty" placeholder="Quantity">

<button onclick="calcStock()">Calculate</button>

<div id="stockResult" class="result"></div>
<canvas id="stockChart"></canvas>

</div>

<!-- TOOL 2 -->
<div class="card" id="pe">

<h2>P/E Calculator</h2>

<input id="price" placeholder="Price">
<input id="eps" placeholder="EPS">

<button onclick="calcPE()">Calculate</button>

<div id="peResult" class="result"></div>

</div>

<!-- TOOL 3 -->
<div class="card" id="portfolio">

<h2>Portfolio Checker</h2>

<div id="rows"></div>

<button onclick="addRow()">Add Holding</button>
<button onclick="calcPortfolio()">Analyze</button>

<div id="portfolioResult" class="result"></div>
<canvas id="portfolioChart"></canvas>

</div>

<!-- TOOL 4 -->
<div class="card" id="broker">

<h2>Brokerage Comparison</h2>

<input id="trade" placeholder="Trade Value ₹">

<button onclick="calcBroker()">Compare</button>

<div id="brokerResult" class="result"></div>
<canvas id="brokerChart"></canvas>

</div>

</div>

<script>

// TOOL 1
function calcStock(){
let buy=+document.getElementById("buy").value;
let sell=+document.getElementById("sell").value;
let qty=+document.getElementById("qty").value;

let profit=(sell-buy)*qty;

stockResult.innerHTML="Profit: ₹"+profit;

new Chart(stockChart,{
type:'bar',
data:{
labels:['Buy','Sell'],
datasets:[{data:[buy*qty,sell*qty]}]
}
});
}

// TOOL 2
function calcPE(){
let p=+price.value;
let e=+eps.value;

let pe=p/e;

peResult.innerHTML="P/E Ratio: "+pe.toFixed(2);
}

// TOOL 3
function addRow(){
let div=document.createElement("div");
div.innerHTML=`<input placeholder="Value ₹" class="val">`;
rows.appendChild(div);
}

function calcPortfolio(){
let vals=document.querySelectorAll(".val");
let total=0;

vals.forEach(v=>total+=+v.value);

portfolioResult.innerHTML="Total Portfolio: ₹"+total;

}

// TOOL 4
function calcBroker(){
let v=+trade.value;

let zerodha=v*0.0003;
let icici=v*0.005;

brokerResult.innerHTML=
"Zerodha: ₹"+zerodha+" | ICICI: ₹"+icici;

new Chart(brokerChart,{
type:'bar',
data:{
labels:['Zerodha','ICICI'],
datasets:[{data:[zerodha,icici]}]
}
});
}

</script>

</body>
</html>
