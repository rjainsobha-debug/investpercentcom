<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property - InvestPercent</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="market-strip">
    <iframe src="https://ticker.finology.in/" frameborder="0"></iframe>
  </div>

  <div class="navbar">
    <div class="logo">InvestPercent</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="investments.html">Invest</a>
      <a href="property.html">Property</a>
      <a href="tax.html">Tax</a>
      <a href="wealth.html">Wealth</a>
      <a href="forex.html">Forex</a>
    </div>
  </div>


<div class="page-hero">
  <h1>Home Loan EMI Calculator</h1>
  <p>Estimate your monthly home loan outflow instantly.</p>
</div>

<div class="calc-wrap">
  <div class="calc-card">
    <div class="form-grid">
      <div>
        <label for="loanAmount">Loan Amount</label>
        <input id="loanAmount" type="number" placeholder="5000000">
      </div>
      <div>
        <label for="interestRate">Interest Rate (%)</label>
        <input id="interestRate" type="number" placeholder="8.5">
      </div>
      <div class="full">
        <label for="loanTenure">Tenure (Years)</label>
        <input id="loanTenure" type="number" placeholder="20">
      </div>
    </div>

    <div class="actions">
      <button class="btn" onclick="calculateEMI()">Calculate EMI</button>
      <button class="btn btn-secondary" onclick="openPopup('property')">Check Property Deals</button>
    </div>

    <div id="emiResult" class="result" style="display:none;">
      <h3>Estimated Monthly EMI</h3>
      <div id="emiValue" class="value">₹ 0</div>
    </div>
  </div>
</div>


  <div id="popup" class="popup">
    <div class="popup-box">
      <h3>Get Free Financial Plan</h3>
      <p>Fill your details and continue to WhatsApp.</p>
      <input id="leadName" placeholder="Your Name">
      <input id="leadMobile" placeholder="Mobile Number">
      <input type="hidden" id="leadCategory" value="investment">
      <div class="popup-actions">
        <button class="btn" onclick="goToWhatsApp()">Continue</button>
        <button class="btn btn-secondary" onclick="closePopup()">Cancel</button>
      </div>
    </div>
  </div>

  <a href="https://wa.me/918882332050" class="whatsapp" aria-label="WhatsApp">💬</a>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
