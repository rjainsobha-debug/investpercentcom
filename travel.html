<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Calculator - InvestPercent</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#021a2c,#0a2e4d);
  color:#fff;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

h1 {
  font-size:32px;
  margin-bottom:10px;
}

.subtitle {
  color:#a0c4ff;
  margin-bottom:30px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card {
  background:#0e2238;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input, select {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  font-size:15px;
}

button {
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.btn-primary {
  background:#00c2ff;
  color:#000;
}

.btn-secondary {
  background:#1f3b5b;
  color:#fff;
}

.result-box {
  margin-top:20px;
  text-align:center;
  font-size:18px;
}

.cta {
  display:block;
  margin-top:15px;
  padding:12px;
  background:#ff5722;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

.whatsapp {
  background:#25D366;
}

.info-box {
  background:#081827;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
  color:#a0c4ff;
}

@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>Estimate your international trip cost</h1>
<p class="subtitle">Flights + Stay + Budget in seconds</p>

<div class="grid">

<!-- CALCULATOR -->
<div class="card">

<h2>Trip Calculator</h2>

<select id="country">
  <option value="">Select Destination</option>
  <option value="Dubai">Dubai</option>
  <option value="Thailand">Thailand</option>
  <option value="Singapore">Singapore</option>
  <option value="UK">United Kingdom</option>
  <option value="USA">United States</option>
  <option value="Canada">Canada</option>
  <option value="Australia">Australia</option>
</select>

<input type="number" id="days" value="7" placeholder="Duration (days)">

<select id="type">
  <option>Leisure</option>
  <option>Student</option>
  <option>Business</option>
</select>

<select id="ticket">
  <option>Economy</option>
  <option>Business</option>
</select>

<button class="btn-primary" onclick="calculate()">Estimate trip cost</button>

<div class="result-box" id="result"></div>

</div>

<!-- INFO -->
<div class="card">

<h2>How this works</h2>

<div class="info-box">
Stay + food cost based on average country budgets.
</div>

<div class="info-box">
Flight cost estimated (live prices available after click).
</div>

<div class="info-box">
Best for quick planning before booking.
</div>

</div>

</div>

</div>

<script>
function calculate(){

let country = document.getElementById("country").value;
let days = parseInt(document.getElementById("days").value);
let ticket = document.getElementById("ticket").value;

if(!country || !days){
  alert("Please fill all fields");
  return;
}

// BASE PRICING LOGIC
let flight = 20000;
let stayPerDay = 4000;

// destination multiplier
if(country === "USA" || country === "UK") {
  flight = 60000;
  stayPerDay = 8000;
}

if(country === "Dubai") {
  flight = 25000;
  stayPerDay = 5000;
}

if(country === "Thailand") {
  flight = 18000;
  stayPerDay = 3500;
}

if(ticket === "Business"){
  flight *= 2;
}

let stay = days * stayPerDay;
let total = flight + stay;

// RESULT + MONETIZATION
document.getElementById("result").innerHTML =
  "Estimated Cost: ₹" + total +

  "<a class='cta' target='_blank' href='https://tp.media/r?marker=715756&trs=514386&p=4114&u=https://aviasales.com'>✈ View Live Flights</a>" +

  "<a class='cta whatsapp' target='_blank' href='https://wa.me/919718773000'>📲 Talk to Travel Expert</a>";
}
</script>

</body>
</html>
