<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Calculator - InvestPercent</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#021a2c,#0a2e4d);
  color:#fff;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

h1 {
  font-size:34px;
  margin-bottom:10px;
}

.subtitle {
  color:#9cc7ff;
  margin-bottom:30px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

.card {
  background:#0e2238;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input, select {
  width:100%;
  padding:14px;
  margin:12px 0;
  border-radius:10px;
  border:none;
  font-size:15px;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  background:#00c2ff;
}

.result {
  margin-top:20px;
  text-align:center;
}

.cta {
  display:block;
  margin-top:15px;
  padding:14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.flight {
  background:#ff5722;
  color:#fff;
}

.whatsapp {
  background:#25D366;
  color:#fff;
}

.info-box {
  background:#081827;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
  color:#9cc7ff;
}

@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>Estimate your international trip cost</h1>
<p class="subtitle">Flights + Stay + Budget in seconds</p>

<div class="grid">

<!-- CALCULATOR -->
<div class="card">

<h2>Trip Calculator</h2>

<input type="text" id="country" list="countries" placeholder="Search destination (e.g. Dubai, USA, Thailand)">
<datalist id="countries">
<option>Dubai</option>
<option>Thailand</option>
<option>Singapore</option>
<option>United States</option>
<option>United Kingdom</option>
<option>Canada</option>
<option>Australia</option>
<option>Germany</option>
<option>France</option>
<option>Italy</option>
<option>Spain</option>
<option>Netherlands</option>
<option>Japan</option>
<option>South Korea</option>
<option>Malaysia</option>
<option>Indonesia</option>
<option>Vietnam</option>
<option>Turkey</option>
<option>Saudi Arabia</option>
<option>Qatar</option>
<option>Oman</option>
<option>Egypt</option>
<option>Switzerland</option>
<option>Sweden</option>
<option>Norway</option>
<option>Denmark</option>
<option>Brazil</option>
<option>Mexico</option>
<option>South Africa</option>
<option>New Zealand</option>
</datalist>

<input type="number" id="days" value="7" placeholder="Duration (days)">

<select id="type">
  <option>Leisure</option>
  <option>Student</option>
  <option>Business</option>
</select>

<select id="ticket">
  <option>Economy</option>
  <option>Business</option>
</select>

<button onclick="calculate()">Estimate trip cost</button>

<div class="result" id="result"></div>

</div>

<!-- INFO -->
<div class="card">

<h2>How this works</h2>

<div class="info-box">
Stay + food cost based on average country budgets.
</div>

<div class="info-box">
Flight cost estimated (live prices available after click).
</div>

<div class="info-box">
Best for quick planning before booking.
</div>

</div>

</div>

</div>

<script>
function calculate(){

let country = document.getElementById("country").value.toLowerCase();
let days = parseInt(document.getElementById("days").value);
let ticket = document.getElementById("ticket").value;

if(!country || !days){
  alert("Please fill all fields");
  return;
}

// DEFAULT
let flight = 20000;
let stayPerDay = 4000;

// SMART LOGIC
if(country.includes("usa") || country.includes("canada")){
  flight = 60000;
  stayPerDay = 8000;
}
else if(country.includes("uk") || country.includes("europe")){
  flight = 50000;
  stayPerDay = 7000;
}
else if(country.includes("dubai") || country.includes("uae")){
  flight = 25000;
  stayPerDay = 5000;
}
else if(country.includes("thailand") || country.includes("bali") || country.includes("indonesia")){
  flight = 18000;
  stayPerDay = 3500;
}
else if(country.includes("singapore")){
  flight = 30000;
  stayPerDay = 6000;
}
else if(country.includes("australia")){
  flight = 55000;
  stayPerDay = 7500;
}

// BUSINESS
if(ticket === "Business"){
  flight *= 2;
}

let stay = days * stayPerDay;
let total = flight + stay;

// RESULT
document.getElementById("result").innerHTML =
  "<h2>Estimated Cost: ₹" + total + "</h2>" +

  "<a class='cta flight' target='_blank' href='https://tp.media/r?marker=715756&trs=514386&p=4114&u=https://aviasales.com'>✈ View Live Flights</a>" +

  "<a class='cta whatsapp' target='_blank' href='https://wa.me/919718773000'>📲 Talk to Travel Expert</a>";
}
</script>

</body>
</html>
