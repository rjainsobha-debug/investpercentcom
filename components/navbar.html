<script>
  function toggleMenu() {
    const drawer = document.getElementById("mobileDrawer");
    if (drawer) drawer.classList.toggle("open");
  }

  function normalizePath(path) {
    if (!path) return "index";
    path = path.toLowerCase().trim();

    // remove leading slash
    if (path.startsWith("/")) path = path.slice(1);

    // remove query/hash if any
    path = path.split("?")[0].split("#")[0];

    // root
    if (path === "" || path === "/") return "index";

    // remove .html
    if (path.endsWith(".html")) path = path.replace(".html", "");

    return path;
  }

  function getCurrentPageKey() {
    const path = normalizePath(window.location.pathname);
    return path;
  }

  function highlightActiveNav() {
    const currentPage = getCurrentPageKey();
    const links = document.querySelectorAll(".nav-link");

    links.forEach(link => {
      link.classList.remove("active");

      const linkPage = (link.dataset.page || "").toLowerCase().trim();
      const linkHref = normalizePath(link.getAttribute("href") || "");

      if (
        currentPage === linkPage ||
        currentPage === linkHref
      ) {
        link.classList.add("active");
      }
    });
  }

  function closeMobileMenuOnLinkClick() {
    const drawer = document.getElementById("mobileDrawer");
    const mobileLinks = drawer ? drawer.querySelectorAll(".nav-link") : [];

    mobileLinks.forEach(link => {
      link.addEventListener("click", () => {
        drawer.classList.remove("open");
      });
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    highlightActiveNav();
    closeMobileMenuOnLinkClick();
  });
</script>
