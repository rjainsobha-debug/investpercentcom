<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>SIP Calculator</h2>

<input id="amount" placeholder="Monthly">
<input id="rate" placeholder="Rate">
<input id="years" placeholder="Years">

<button onclick="calc()">Calculate</button>

<div id="result"></div>

<script>
function calc(){
let P=+amount.value;
let r=+rate.value/100/12;
let n=+years.value*12;
let future=P*((Math.pow(1+r,n)-1)/r)*(1+r);
result.innerHTML="₹ "+Math.round(future);
}
</script>

</body></html>
