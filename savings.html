<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savings - InvestPercent</title>
<style>
body{margin:0;font-family:Inter;background:#060915;color:#fff}
.container{max-width:1100px;margin:auto;padding:20px}
.nav{display:flex;justify-content:space-between;padding:16px;border:1px solid rgba(255,255,255,0.08);border-radius:16px;margin-bottom:20px}
.nav a{margin:0 6px;color:#9da9c6;text-decoration:none;font-size:13px}
.nav a:hover{color:#fff}

.hero{padding:30px;border-radius:20px;background:linear-gradient(135deg,#0f1b3d,#091224);margin-bottom:20px}
.hero h1{margin:0;font-size:34px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.card{padding:20px;border-radius:20px;background:#0f1830;border:1px solid rgba(255,255,255,0.08)}
input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none;background:#1b2545;color:#fff}

button{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#00d4ff,#7b61ff);color:#000;font-weight:bold;cursor:pointer}

.result{margin-top:10px;font-size:18px;color:#00e676}

@media(max-width:700px){
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="container">

<div class="nav">
<div><b>InvestPercent</b></div>
<div>
<a href="index.html">Home</a>
<a href="investment.html">Investment</a>
<a href="loan.html">Loan</a>
<a href="tax.html">Tax</a>
<a href="savings.html">Savings</a>
</div>
</div>

<div class="hero">
<h1>Savings Tools (Interactive)</h1>
</div>

<div class="grid">

<div class="card">
<h2>FD Calculator</h2>
<input id="fd_amount" placeholder="Amount ₹">
<input id="fd_rate" placeholder="Rate %">
<input id="fd_years" placeholder="Years">
<button onclick="calcFD()">Calculate</button>
<div id="fd_result" class="result"></div>
</div>

<div class="card">
<h2>RD Calculator</h2>
<input id="rd_amount" placeholder="Monthly ₹">
<input id="rd_rate" placeholder="Rate %">
<input id="rd_years" placeholder="Years">
<button onclick="calcRD()">Calculate</button>
<div id="rd_result" class="result"></div>
</div>

</div>

</div>

<script>
function calcFD(){
let p=parseFloat(document.getElementById('fd_amount').value);
let r=parseFloat(document.getElementById('fd_rate').value)/100;
let t=parseFloat(document.getElementById('fd_years').value);

let maturity=p*Math.pow(1+r,t);
document.getElementById('fd_result').innerHTML="Maturity: ₹"+Math.round(maturity);
}

function calcRD(){
let m=parseFloat(document.getElementById('rd_amount').value);
let r=parseFloat(document.getElementById('rd_rate').value)/100/12;
let n=parseFloat(document.getElementById('rd_years').value)*12;

let maturity=m*((Math.pow(1+r,n)-1)/r)*(1+r);
document.getElementById('rd_result').innerHTML="Maturity: ₹"+Math.round(maturity);
}
</script>

</body>
</html>
