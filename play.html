<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Hub | InvestPercent</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/calculator.css">

<style>
body {
  background: linear-gradient(135deg,#0c0f1a,#121826);
  color:#fff;
  font-family: 'Inter', sans-serif;
}

.hero {
  text-align:center;
  padding:80px 20px;
}

.hero h1 {
  font-size:48px;
  font-weight:700;
  background: linear-gradient(90deg,#00ffa3,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.section {
  padding:40px 20px;
  max-width:1200px;
  margin:auto;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  backdrop-filter: blur(10px);
  transition:0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow:0 10px 30px rgba(0,255,163,0.2);
}

input,button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  background: linear-gradient(90deg,#00ffa3,#00c3ff);
  color:#000;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2 style="padding:20px">InvestPercent 🎮 Play Hub</h2>
</header>

<section class="hero">
<h1>Play. Learn. Grow.</h1>
<p>Gamified finance for smarter decisions</p>
</section>

<!-- GAMES -->
<section class="section">
<h2>🎮 Featured Games</h2>

<div class="grid">

<!-- SIP GAME -->
<div class="card">
<h3>SIP Growth Simulator</h3>
<input type="number" id="sip" placeholder="Monthly SIP ₹">
<input type="number" id="years" placeholder="Years">
<button onclick="calculateSIP()">Simulate</button>
<h4 id="sipResult"></h4>
</div>

<!-- EMI GAME -->
<div class="card">
<h3>EMI Challenge</h3>
<p>Loan: ₹5,00,000 | Rate: 10% | 5 Years</p>
<input type="number" id="emiGuess" placeholder="Guess EMI">
<button onclick="checkEMI()">Check</button>
<h4 id="emiResult"></h4>
</div>

</div>
</section>

<!-- LEADERBOARD -->
<section class="section">
<h2>🏆 Leaderboard</h2>
<div class="grid">
<div class="card">Rahul - 1200 pts</div>
<div class="card">Amit - 980 pts</div>
<div class="card">Sneha - 870 pts</div>
</div>
</section>

<!-- CTA -->
<section class="section">
<div class="card" style="text-align:center">
<h2>Ready to turn virtual gains into real wealth?</h2>
<button onclick="window.location.href='https://justinvesting.in'">Get Expert Advice</button>
</div>
</section>

<script>
function calculateSIP(){
  let sip = document.getElementById('sip').value;
  let years = document.getElementById('years').value;
  let rate = 12/100/12;
  let months = years*12;

  let future = sip * ((Math.pow(1+rate,months)-1)/rate) * (1+rate);

  document.getElementById('sipResult').innerText = "Future Value: ₹" + Math.round(future);
}

function checkEMI(){
  let guess = document.getElementById('emiGuess').value;
  let P=500000, r=10/100/12, n=60;

  let emi = P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);

  document.getElementById('emiResult').innerText =
    "Actual EMI: ₹" + Math.round(emi) + (Math.abs(emi-guess)<500 ? " ✅ Good Guess!" : " ❌ Try Again");
}
</script>

</body>
</html>
