<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loan</title>

<style>
body{background:#041424;color:#fff;font-family:Inter}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#0b2d4d;padding:20px;border-radius:20px}
input{width:100%;padding:10px;margin-top:10px}
button{margin-top:10px;padding:10px;width:100%;background:#32c7ff}
</style>
</head>

<body>

<div class="container">
<h1>EMI Calculator</h1>

<div class="card">

<input id="loan" placeholder="Loan Amount">
<input id="rate" placeholder="Rate %">
<input id="years" placeholder="Years">

<button onclick="calc()">Calculate</button>

<canvas id="chart"></canvas>
<div id="result"></div>

</div>
</div>

<script>
function calc(){
let P=+loan.value;
let r=+rate.value/100/12;
let n=+years.value*12;

let emi=(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
let total=emi*n;

result.innerHTML="EMI: ₹"+Math.round(emi);

new Chart(chart,{
type:'pie',
data:{
labels:['Principal','Interest'],
datasets:[{data:[P,total-P]}]
}
});
}
</script>

</body>
</html>
