<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loan Calculator</title>

<style>
body{font-family:Inter;background:#041424;color:#fff;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#0b2d4d;padding:20px;border-radius:20px;margin-top:20px}
input{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;background:#061427;color:white}
button{margin-top:15px;padding:12px;width:100%;background:#32c7ff;border:none;border-radius:10px;font-weight:700}
.result{margin-top:15px;font-size:20px}
</style>
</head>

<body>

<div class="container">
<h1>Loan EMI Calculator</h1>

<div class="card">

<input id="loan" placeholder="Loan Amount">
<input id="rate" placeholder="Interest Rate %">
<input id="years" placeholder="Years">

<button onclick="calcEMI()">Calculate EMI</button>

<div id="result" class="result"></div>

</div>
</div>

<script>
function calcEMI(){
let P = +document.getElementById("loan").value;
let r = +document.getElementById("rate").value/100/12;
let n = +document.getElementById("years").value*12;

let EMI = (P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
let total = EMI*n;
let interest = total-P;

document.getElementById("result").innerHTML =
"EMI: ₹"+Math.round(EMI)+"<br>"+
"Total Payment: ₹"+Math.round(total)+"<br>"+
"Interest: ₹"+Math.round(interest);
}
</script>

</body>
</html>
