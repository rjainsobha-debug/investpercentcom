<!DOCTYPE html>
<html>
<head>
  <title>Tax Calculator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

<h2>Income Tax Calculator</h2>

<input type="number" id="income" placeholder="Annual Income (₹)">

<button class="btn" onclick="calculateTax()">Calculate Tax</button>

<div class="result" id="taxResult"></div>

</div>

<script>
function calculateTax() {
  let income = document.getElementById("income").value;
  let tax = income * 0.1;
  document.getElementById("taxResult").innerText = "Estimated Tax: ₹ " + tax;
}
</script>

</body>
</html>
