<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Investment Dashboard — investpercent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--accent:#00d4ff;
--accent2:#7b61ff;
--green:#22c55e;
--text:#fff;
--muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter';
background:linear-gradient(180deg,#020617,#020617);
color:var(--text);
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#020617;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-family:'Poppins';
font-weight:700;
font-size:20px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
cursor:pointer;
}

/* HEADER */
.header{
text-align:center;
padding:40px 20px 10px;
}

.header h1{
font-size:36px;
font-family:'Poppins';
}

.header p{
color:var(--muted);
margin-top:10px;
}

/* MAIN */
.main{
max-width:1200px;
margin:auto;
padding:20px;
}

/* TOP KPI */
.kpi{
text-align:center;
margin-bottom:30px;
}

.kpi .value{
font-size:48px;
font-weight:700;
color:var(--green);
}

.kpi .sub{
color:var(--muted);
margin-top:5px;
}

/* CONTROLS */
.controls{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.control{
background:var(--card);
padding:20px;
border-radius:14px;
}

.control label{
font-size:13px;
color:var(--muted);
}

.control input[type=range]{
width:100%;
margin-top:10px;
}

.control .val{
margin-top:5px;
font-weight:600;
}

/* CHART */
.chart-box{
background:var(--card);
padding:20px;
border-radius:16px;
}

/* CTA */
.cta{
margin-top:30px;
padding:20px;
border-radius:14px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
text-align:center;
color:black;
font-weight:600;
cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){
.controls{grid-template-columns:1fr}
}

</style>
</head>

<body>

<nav>
<div class="logo" onclick="goHome()">invest%</div>
</nav>

<div class="header">
<h1>Investment Simulator</h1>
<p>Visualize your future wealth instantly</p>
</div>

<div class="main">

<!-- KPI -->
<div class="kpi">
<div class="value" id="future">₹0</div>
<div class="sub">Projected Wealth</div>
</div>

<!-- CONTROLS -->
<div class="controls">

<div class="control">
<label>Monthly Investment</label>
<input type="range" min="1000" max="100000" value="10000" id="amt">
<div class="val" id="amtVal">₹10,000</div>
</div>

<div class="control">
<label>Return %</label>
<input type="range" min="1" max="20" value="12" id="rate">
<div class="val" id="rateVal">12%</div>
</div>

<div class="control">
<label>Years</label>
<input type="range" min="1" max="40" value="10" id="years">
<div class="val" id="yearVal">10 Years</div>
</div>

</div>

<!-- CHART -->
<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<!-- CTA -->
<div class="cta" onclick="invest()">
🚀 Start Investing Now →  
</div>

</div>

<script>

function goHome(){
window.location.href="index.html";
}

function invest(){
window.open("https://justinvesting.in","_blank");
}

let chart;

/* CALC */
function calc(){

let P = +amt.value;
let r = rate.value/100/12;
let n = years.value*12;

amtVal.innerText="₹"+P.toLocaleString();
rateVal.innerText=rate.value+"%";
yearVal.innerText=years.value+" Years";

let total=0;
let labels=[];
let data=[];

for(let i=1;i<=n;i++){
total = total*(1+r)+P;

if(i%12==0){
labels.push("Year "+(i/12));
data.push(Math.round(total));
}
}

future.innerText="₹"+Math.round(total).toLocaleString();

if(chart) chart.destroy();

chart = new Chart(chartCanvas,{
type:"line",
data:{
labels:labels,
datasets:[{
data:data,
borderColor:"#00d4ff",
backgroundColor:"rgba(0,212,255,0.1)",
fill:true,
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{grid:{display:false}},
y:{grid:{color:"rgba(255,255,255,0.05)"}}
}
}
});

}

/* INIT */
const amt = document.getElementById("amt");
const rate = document.getElementById("rate");
const years = document.getElementById("years");

const chartCanvas = document.getElementById("chart");

amt.oninput = calc;
rate.oninput = calc;
years.oninput = calc;

calc();

</script>

</body>
</html>
