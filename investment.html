<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment OS — investpercent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Inter';
background:linear-gradient(180deg,#020617,#020617);
color:white;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

/* ===== NAV ===== */
nav{
display:flex;
justify-content:space-between;
padding:18px 30px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-family:'Poppins';
font-size:22px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
-webkit-background-clip:text;
color:transparent;
cursor:pointer;
}

/* ===== TABS ===== */
.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:20px 0;
}

.tab{
padding:10px 14px;
border-radius:12px;
background:#111827;
cursor:pointer;
font-size:13px;
transition:0.2s;
}

.tab.active{
background:linear-gradient(90deg,#00d4ff,#7b61ff);
color:black;
}

/* ===== LAYOUT ===== */
.main{
display:grid;
grid-template-columns:380px 1fr;
gap:20px;
}

/* ===== PANEL ===== */
.panel{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.06);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* ===== INPUT ===== */
.control{
margin-bottom:18px;
}

label{
font-size:13px;
color:#94a3b8;
}

input{
width:100%;
padding:12px;
margin-top:6px;
background:#1e293b;
border:none;
border-radius:10px;
color:white;
}

/* ===== KPI ===== */
.kpi{
font-size:42px;
color:#00e676;
font-weight:600;
}

.sub{
color:#94a3b8;
margin-top:5px;
}

/* ===== CHART ===== */
.chart{
margin-top:20px;
}

/* ===== INSIGHT ===== */
.insight{
margin-top:20px;
padding:15px;
border-radius:12px;
background:rgba(0,212,255,0.08);
font-size:14px;
}

/* ===== CTA ===== */
.cta{
margin-top:20px;
padding:15px;
border-radius:12px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
text-align:center;
color:black;
cursor:pointer;
font-weight:600;
}

/* ===== MOBILE ===== */
@media(max-width:900px){
.main{grid-template-columns:1fr}
}

</style>
</head>

<body>

<nav>
<div class="logo" onclick="location.href='index.html'">invest%</div>
</nav>

<div class="container">

<div class="tabs" id="tabs"></div>

<div class="main">

<!-- CONTROLS -->
<div class="panel" id="controls"></div>

<!-- DASHBOARD -->
<div class="panel">

<div class="kpi" id="value">₹0</div>
<div class="sub" id="sub">Projected Wealth</div>

<canvas id="chart" class="chart"></canvas>

<div class="insight" id="insight"></div>

<div class="cta" onclick="window.open('https://justinvesting.in','_blank')">
Start Investing →
</div>

</div>

</div>

</div>

<script>

let mode="sip";
let chart;

const calculators = [
["sip","SIP"],
["lump","Lump"],
["step","Step-Up"],
["swp","SWP"],
["cagr","CAGR"],
["ppf","PPF"],
["nps","NPS"],
["epf","EPF"],
["ssy","Sukanya"]
];

/* ===== TABS ===== */
function renderTabs(){
let html="";
calculators.forEach(c=>{
html+=`<div class="tab ${c[0]==mode?"active":""}" onclick="switchTab('${c[0]}')">${c[1]}</div>`;
});
tabs.innerHTML=html;
}

function switchTab(m){
mode=m;
renderTabs();
renderControls();
calc();
}

/* ===== CONTROLS ===== */
function renderControls(){

let html="";

if(mode==="sip") html=inputs3("Monthly","Return %","Years");
if(mode==="lump") html=inputs3("Amount","Return %","Years");
if(mode==="step") html=inputs4("Start SIP","Step %","Return %","Years");
if(mode==="swp") html=inputs4("Corpus","Withdraw","Return %","Years");
if(mode==="cagr") html=inputs3("Start","End","Years");

if(["ppf","nps","epf","ssy"].includes(mode))
html=inputs3("Yearly Investment","Rate %","Years");

controls.innerHTML=html;
document.querySelectorAll("#controls input").forEach(i=>i.oninput=calc);
}

function inputs3(a,b,c){
return `
<div class="control"><label>${a}</label><input id="x" value="10000"></div>
<div class="control"><label>${b}</label><input id="y" value="12"></div>
<div class="control"><label>${c}</label><input id="z" value="10"></div>`;
}

function inputs4(a,b,c,d){
return `
<div class="control"><label>${a}</label><input id="x" value="10000"></div>
<div class="control"><label>${b}</label><input id="w" value="10"></div>
<div class="control"><label>${c}</label><input id="y" value="12"></div>
<div class="control"><label>${d}</label><input id="z" value="10"></div>`;
}

/* ===== CALC ===== */
function calc(){

let labels=[],data=[],final=0;

let P=+x.value;
let r=y.value/100;
let t=+z.value;

if(mode==="sip"){
let mr=r/12,n=t*12,total=0;
for(let i=1;i<=n;i++){
total=total*(1+mr)+P;
if(i%12==0){labels.push("Y"+i/12);data.push(total);}
}
final=total;
insight.innerText="Consistent investing builds long-term wealth.";
}

if(mode==="lump"){
for(let i=1;i<=t;i++){
let val=P*Math.pow(1+r,i);
labels.push("Y"+i);
data.push(val);
}
final=data[data.length-1];
insight.innerText="Time in market matters more than timing.";
}

if(mode==="step"){
let inc=w.value/100,mr=r/12,n=t*12,total=0;
for(let i=1;i<=n;i++){
total=total*(1+mr)+P;
if(i%12==0){P*=1+inc;labels.push("Y"+i/12);data.push(total);}
}
final=total;
insight.innerText="Increasing SIP accelerates wealth growth.";
}

if(mode==="swp"){
let corpus=P,mr=r/12,n=t*12,withdraw=w.value;
for(let i=1;i<=n;i++){
corpus=corpus*(1+mr)-withdraw;
if(i%12==0){labels.push("Y"+i/12);data.push(corpus);}
}
final=corpus;
insight.innerText="SWP helps create steady income.";
}

if(mode==="cagr"){
let val=(Math.pow(y.value/x.value,1/t)-1)*100;
value.innerText=val.toFixed(2)+"%";
sub.innerText="CAGR";
insight.innerText="CAGR shows real annual return.";
return;
}

if(["ppf","nps","epf","ssy"].includes(mode)){
let total=0;
for(let i=1;i<=t;i++){
total=(total+P)*(1+r);
labels.push("Y"+i);
data.push(total);
}
final=total;
insight.innerText="Government schemes offer stable returns.";
}

value.innerText="₹"+Math.round(final).toLocaleString();
sub.innerText="Projected Wealth";

if(chart) chart.destroy();

chart=new Chart(chartCanvas,{
type:"line",
data:{labels:labels,datasets:[{
data:data,
borderColor:"#00d4ff",
backgroundColor:"rgba(0,212,255,0.1)",
fill:true
}]}
});

}

const chartCanvas=document.getElementById("chart");

/* INIT */
renderTabs();
renderControls();
calc();

</script>

</body>
</html>
