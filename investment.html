<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Investment Tools — investpercent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0a0e1a;
--card:#111827;
--accent:#00d4ff;
--accent2:#7b61ff;
--green:#00e676;
--text:#ffffff;
--muted:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Inter';
background:linear-gradient(180deg,#0a0e1a,#020617);
color:var(--text);
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#020617;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-family:'Poppins';
font-weight:700;
font-size:20px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
cursor:pointer;
}

.nav-links a{
margin-left:20px;
color:var(--muted);
text-decoration:none;
font-size:14px;
}

.nav-links a:hover{color:var(--accent)}

/* HERO */
.header{
padding:60px 40px 20px;
}

.header h1{
font-size:34px;
font-family:'Poppins';
}

.header p{
color:var(--muted);
margin-top:8px;
}

/* LAYOUT */
.main{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
padding:20px 40px;
}

.card{
background:var(--card);
padding:25px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.05);
}

/* INPUT */
.input-group{
margin-bottom:20px;
}

label{
font-size:13px;
color:var(--muted);
}

input{
width:100%;
margin-top:8px;
padding:14px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
font-size:14px;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
font-weight:600;
cursor:pointer;
margin-top:10px;
}

/* RESULT PANEL */
.result-box{
text-align:center;
}

.big{
font-size:34px;
font-weight:700;
color:var(--green);
margin:10px 0;
}

.sub{
color:var(--muted);
font-size:14px;
}

/* CTA */
.cta{
margin-top:25px;
padding:20px;
border-radius:14px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
text-align:center;
color:black;
font-weight:600;
cursor:pointer;
}

.cta small{
display:block;
font-weight:400;
margin-top:5px;
}

/* MOBILE */
@media(max-width:900px){
.main{grid-template-columns:1fr}
}

</style>
</head>

<body>

<nav>
<div class="logo" onclick="goHome()">invest%</div>

<div class="nav-links">
<a href="investment.html">Investment</a>
<a href="#">Tax</a>
<a href="#">Loan</a>
<a href="#">Retirement</a>
</div>
</nav>

<div class="header">
<h1>Investment Calculator</h1>
<p>Plan your wealth with precision</p>
</div>

<div class="main">

<!-- LEFT INPUT -->
<div class="card">

<div class="input-group">
<label>Monthly Investment (₹)</label>
<input id="amt" value="10000">
</div>

<div class="input-group">
<label>Expected Return (%)</label>
<input id="rate" value="12">
</div>

<div class="input-group">
<label>Duration (Years)</label>
<input id="years" value="10">
</div>

<button onclick="calc()">Calculate</button>

</div>

<!-- RIGHT RESULT -->
<div class="card result-box">

<div class="sub">Future Value</div>
<div id="value" class="big">₹0</div>

<div class="sub">Invested</div>
<div id="invested">₹0</div>

<div class="sub">Estimated Gains</div>
<div id="gains">₹0</div>

<canvas id="chart" style="margin-top:20px;"></canvas>

<div class="cta" onclick="invest()">
Start Investing →
<small>Free portfolio review on justinvesting.in</small>
</div>

</div>

</div>

<script>

function goHome(){
window.location.href="index.html";
}

function invest(){
window.open("https://justinvesting.in","_blank");
}

function calc(){

let P = +amt.value;
let r = rate.value/100/12;
let n = years.value*12;

let future = P*((Math.pow(1+r,n)-1)/r)*(1+r);
let invested = P*n;
let gain = future - invested;

animate("value",future);
animate("invested",invested);
animate("gains",gain);

renderChart(invested,future);
}

/* ANIMATION */
function animate(id,val){
let el = document.getElementById(id);
let start = 0;
let step = val/40;

let int = setInterval(()=>{
start += step;
if(start>=val){
start=val;
clearInterval(int);
}
el.innerText="₹"+Math.round(start);
},20);
}

/* CHART */
let chart;

function renderChart(invested,value){

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["0","2","4","6","8","10"],
datasets:[{
data:[0, value*0.2,value*0.4,value*0.6,value*0.8,value],
borderColor:"#00d4ff",
fill:true,
backgroundColor:"rgba(0,212,255,0.1)"
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{grid:{display:false}},
y:{grid:{color:"rgba(255,255,255,0.05)"}}
}
}
});
}

</script>

</body>
</html>
