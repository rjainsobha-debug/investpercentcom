<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Simulator — investpercent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--accent:#00d4ff;
--accent2:#7b61ff;
--green:#22c55e;
--text:#fff;
--muted:#94a3b8;
}

body{
margin:0;
font-family:'Inter';
background:var(--bg);
color:var(--text);
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#020617;
}

.logo{
font-family:'Poppins';
font-weight:700;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
cursor:pointer;
}

/* HEADER */
.header{
padding:40px;
}

.header h1{
font-size:32px;
}

.header p{
color:var(--muted);
}

/* LAYOUT */
.main{
display:grid;
grid-template-columns:1fr 1.2fr;
gap:30px;
padding:0 40px 40px;
}

/* CARD */
.card{
background:var(--card);
padding:25px;
border-radius:20px;
}

/* INPUT */
.input-group{
margin-bottom:20px;
}

label{
font-size:13px;
color:var(--muted);
}

input{
width:100%;
margin-top:8px;
padding:14px;
border-radius:12px;
border:none;
background:#1e293b;
color:white;
font-size:15px;
}

/* RESULT */
.big{
font-size:38px;
font-weight:700;
color:var(--green);
}

.row{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
color:var(--muted);
}

/* CTA */
.cta{
margin-top:20px;
padding:18px;
border-radius:14px;
background:linear-gradient(90deg,#00d4ff,#7b61ff);
text-align:center;
color:black;
font-weight:600;
cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){
.main{grid-template-columns:1fr}
}

</style>
</head>

<body>

<nav>
<div class="logo" onclick="goHome()">invest%</div>
</nav>

<div class="header">
<h1>Investment Simulator</h1>
<p>See your wealth grow in real time</p>
</div>

<div class="main">

<!-- INPUT -->
<div class="card">

<div class="input-group">
<label>Monthly Investment (₹)</label>
<input id="amt" value="10000" oninput="calc()">
</div>

<div class="input-group">
<label>Return (%)</label>
<input id="rate" value="12" oninput="calc()">
</div>

<div class="input-group">
<label>Years</label>
<input id="years" value="10" oninput="calc()">
</div>

</div>

<!-- RESULT -->
<div class="card">

<div class="big" id="value">₹0</div>

<div class="row">
<span>Invested</span>
<span id="invested">₹0</span>
</div>

<div class="row">
<span>Returns</span>
<span id="gains">₹0</span>
</div>

<canvas id="chart" style="margin-top:20px;"></canvas>

<div class="cta" onclick="invest()">
Start Investing →
</div>

</div>

</div>

<script>

function goHome(){
window.location.href="index.html";
}

function invest(){
window.open("https://justinvesting.in","_blank");
}

let chart;

function calc(){

let P = +amt.value;
let r = rate.value/100/12;
let n = years.value*12;

let total = 0;
let invested = 0;

let labels = [];
let data = [];

for(let i=1;i<=n;i++){
total = total*(1+r)+P;
invested += P;

if(i%12==0){
labels.push("Year "+(i/12));
data.push(Math.round(total));
}
}

let final = total;
let gain = final - invested;

document.getElementById("value").innerText="₹"+Math.round(final);
document.getElementById("invested").innerText="₹"+invested;
document.getElementById("gains").innerText="₹"+Math.round(gain);

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[{
data:data,
borderColor:"#00d4ff",
backgroundColor:"rgba(0,212,255,0.1)",
fill:true,
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{grid:{display:false}},
y:{grid:{color:"rgba(255,255,255,0.05)"}}
}
}
});
}

calc();

</script>

</body>
</html>
